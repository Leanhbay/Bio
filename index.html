<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tiểu sử của tôi</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@property --ig-rot{syntax:'<angle>';initial-value:0deg;inherits:false}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0}
body{font-family:'Inter',sans-serif;background:#0a0f1e;color:#e2e8f0;overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
img{pointer-events:none;-webkit-user-drag:none;user-drag:none;image-rendering:-webkit-optimize-contrast}

.nebula-1{position:fixed;top:-120px;left:-120px;width:550px;height:550px;background:radial-gradient(circle,rgba(0,229,255,0.22) 0%,transparent 70%);filter:blur(80px);pointer-events:none;z-index:0;animation:nebFloat1 9s ease-in-out infinite}
.nebula-2{position:fixed;bottom:-120px;right:-120px;width:550px;height:550px;background:radial-gradient(circle,rgba(124,58,237,0.20) 0%,transparent 70%);filter:blur(80px);pointer-events:none;z-index:0;animation:nebFloat2 11s ease-in-out infinite}
.nebula-3{position:fixed;top:40%;right:-80px;width:450px;height:450px;background:radial-gradient(circle,rgba(6,182,212,0.16) 0%,transparent 70%);filter:blur(90px);pointer-events:none;z-index:0;animation:nebFloat3 13s ease-in-out infinite}
.nebula-4{position:fixed;bottom:30%;left:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,0.13) 0%,transparent 70%);filter:blur(70px);pointer-events:none;z-index:0;animation:nebFloat1 15s ease-in-out infinite reverse}
.nebula-5{position:fixed;top:20%;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(0,229,255,0.06) 0%,transparent 70%);filter:blur(100px);pointer-events:none;z-index:0;animation:nebFloat3 18s ease-in-out infinite reverse}
@keyframes nebFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,30px) scale(1.12)}}
@keyframes nebFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-25px) scale(1.1)}}
@keyframes nebFloat3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,20px) scale(1.15)}}

.space-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.035) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:1}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:2}
.scan-sweep{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,0.7) 50%,transparent 100%);z-index:100;animation:sweep 5s ease-in-out infinite;pointer-events:none;box-shadow:0 0 20px rgba(0,229,255,0.3),0 0 60px rgba(0,229,255,0.1)}
@keyframes sweep{0%{transform:translateX(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(100%);opacity:0}}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

.reveal{opacity:0;transform:translateY(30px) scale(0.98);transition:all 0.8s cubic-bezier(0.16,1,0.3,1);filter:blur(10px)}
.reveal.active{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
.delay-1{transition-delay:100ms}.delay-2{transition-delay:200ms}.delay-3{transition-delay:300ms}
.delay-4{transition-delay:400ms}.delay-5{transition-delay:500ms}.delay-6{transition-delay:600ms}
.delay-7{transition-delay:700ms}.delay-8{transition-delay:800ms}.delay-9{transition-delay:900ms}

.orbit-system{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;perspective:800px;margin-bottom:28px}
.orbit-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid}
.ring-1{border-color:rgba(0,229,255,0.25);transform:rotateX(72deg);animation:orbitSpin1 7s linear infinite;box-shadow:0 0 15px rgba(0,229,255,0.08)}
.ring-2{border-color:rgba(124,58,237,0.20);transform:rotateX(72deg) rotateY(55deg);animation:orbitSpin2 9s linear infinite;box-shadow:0 0 15px rgba(124,58,237,0.06)}
.ring-3{border-color:rgba(6,182,212,0.12);transform:rotateX(45deg) rotateY(-30deg);animation:orbitSpin1 13s linear infinite reverse;box-shadow:0 0 10px rgba(6,182,212,0.05)}
.orbit-particle{position:absolute;width:6px;height:6px;border-radius:50%;top:-3px;left:50%;margin-left:-3px}
.ring-1 .orbit-particle{background:#00e5ff;box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.5)}
.ring-2 .orbit-particle{background:#7c3aed;box-shadow:0 0 10px #7c3aed,0 0 25px rgba(124,58,237,0.5)}
.ring-3 .orbit-particle{background:#06b6d4;box-shadow:0 0 8px #06b6d4,0 0 20px rgba(6,182,212,0.4);width:4px;height:4px;top:-2px;margin-left:-2px}
@keyframes orbitSpin1{to{transform:rotateX(72deg) rotateZ(360deg)}}
@keyframes orbitSpin2{to{transform:rotateX(72deg) rotateY(55deg) rotateZ(360deg)}}
.avatar-ring{background:conic-gradient(from 0deg,#00e5ff,#7c3aed,#06b6d4,#a855f7,#00e5ff);animation:ringRotate 4s linear infinite;padding:3px;filter:drop-shadow(0 0 12px rgba(0,229,255,0.4)) drop-shadow(0 0 30px rgba(124,58,237,0.2))}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.avatar-wrapper{position:relative;z-index:2;transition:transform 0.5s cubic-bezier(0.16,1,0.3,1)}

.status-dot{animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.radar-ping{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(0,229,255,0.5);animation:radarPing 2s ease-out infinite}
.radar-ping:nth-child(2){animation-delay:0.7s}
@keyframes radarPing{0%{transform:scale(1);opacity:0.8}100%{transform:scale(3);opacity:0}}

.live-clock-container{display:flex;align-items:center;justify-content:center;gap:16px;padding:20px 24px;border-radius:18px;background:linear-gradient(135deg,rgba(0,229,255,0.04),rgba(124,58,237,0.02));border:1px solid rgba(0,229,255,0.1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),inset 0 0 50px rgba(0,229,255,0.02),0 4px 20px rgba(0,0,0,0.3);margin-bottom:8px;position:relative;overflow:hidden}
.live-clock-container::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.3),transparent)}
.clock-time{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:800;letter-spacing:2px;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#00e5ff 0%,#ffffff 30%,#e2e8f0 50%,#c4b5fd 80%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(0,229,255,0.3))}
.clock-seconds{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:500;color:#00e5ff;opacity:0.6;font-variant-numeric:tabular-nums;animation:secPulse 1s ease-in-out infinite;text-shadow:0 0 10px rgba(0,229,255,0.3)}
@keyframes secPulse{0%,100%{opacity:0.2}50%{opacity:0.9}}
.clock-separator{display:flex;flex-direction:column;gap:5px}
.clock-separator span{width:3px;height:3px;border-radius:50%;background:#00e5ff;opacity:0.4;box-shadow:0 0 4px rgba(0,229,255,0.5)}
.clock-date{font-size:12px;color:#64748b;font-weight:500;text-align:center;margin-bottom:20px;letter-spacing:0.5px}

.ip-card{background:linear-gradient(135deg,rgba(0,229,255,0.03),rgba(15,23,42,0.9));border:1px solid rgba(0,229,255,0.08);border-radius:20px;overflow:hidden;max-height:0;opacity:0;margin-bottom:0;transition:all 0.6s cubic-bezier(0.16,1,0.3,1);border-width:0;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.ip-card.visible{max-height:600px;opacity:1;margin-bottom:32px;border-width:1px;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04)}
.ip-card-header{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,229,255,0.06);position:relative}
.ip-card-header::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.15),transparent)}
.ip-card-body{padding:4px 20px 20px}
.ip-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;opacity:0;transform:translateY(12px);transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
.ip-row.show{opacity:1;transform:translateY(0)}
.ip-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.03)}
.ip-label{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;font-weight:500}
.ip-label .iconify{font-size:15px;color:#00e5ff;opacity:0.7;filter:drop-shadow(0 0 4px rgba(0,229,255,0.3))}
.ip-value{font-size:13px;color:#cbd5e1;font-weight:600;font-variant-numeric:tabular-nums}
.ip-value.primary{color:#00e5ff;font-weight:700;font-size:14px;letter-spacing:0.8px;text-shadow:0 0 15px rgba(0,229,255,0.4),0 0 30px rgba(0,229,255,0.15)}
.ip-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.ip-badge.ipv4{background:rgba(0,229,255,0.12);color:#00e5ff;border:1px solid rgba(0,229,255,0.15)}
.ip-badge.ipv6{background:rgba(124,58,237,0.15);color:#c4b5fd;border:1px solid rgba(124,58,237,0.15)}
.ip-copy-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.12);color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.3s ease;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.ip-copy-btn:hover{background:rgba(0,229,255,0.12);color:#e2e8f0;border-color:rgba(0,229,255,0.25);box-shadow:0 4px 15px rgba(0,229,255,0.1)}
.ip-copy-btn.copied{background:rgba(0,229,255,0.15);border-color:rgba(0,229,255,0.35);color:#00e5ff}

.divider{height:1px;background:linear-gradient(to right,transparent,rgba(0,229,255,0.35),rgba(124,58,237,0.35),transparent);position:relative;margin-bottom:24px;box-shadow:0 0 8px rgba(0,229,255,0.1)}
.divider::after{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:7px;height:7px;background:#00e5ff;border-radius:50%;box-shadow:0 0 12px #00e5ff,0 0 30px rgba(0,229,255,0.4),0 0 60px rgba(0,229,255,0.15)}

.social-links-wrap{perspective:1200px;perspective-origin:center}
.social-link{position:relative;display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:20px;background:linear-gradient(160deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 40%,rgba(255,255,255,0.04) 100%),rgba(10,15,30,0.85);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);transition:all 0.5s cubic-bezier(0.16,1,0.3,1);overflow:hidden;cursor:pointer;text-decoration:none;color:#e2e8f0;transform-style:preserve-3d;will-change:transform,box-shadow;box-shadow:0 4px 16px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.1),inset 0 -1px 0 rgba(0,0,0,0.3);animation:hubBreath 4s ease-in-out infinite}
.social-link:nth-child(2){animation-delay:0.5s}.social-link:nth-child(3){animation-delay:1s}.social-link:nth-child(4){animation-delay:1.5s}.social-link:nth-child(5){animation-delay:2s}.social-link:nth-child(6){animation-delay:2.5s}
@keyframes hubBreath{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.1),inset 0 -1px 0 rgba(0,0,0,0.3)}50%{box-shadow:0 6px 20px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.08),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -1px 0 rgba(0,0,0,0.3),0 0 30px rgba(0,229,255,0.02)}}
.social-link::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 20%,rgba(255,255,255,0.35) 50%,rgba(255,255,255,0.25) 80%,transparent 100%);z-index:15;pointer-events:none}
.social-link::after{content:'';position:absolute;top:-150%;left:-150%;width:400%;height:400%;background:radial-gradient(ellipse at var(--gx,50%) var(--gy,50%),rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.06) 12%,transparent 45%);opacity:0;transition:opacity 0.4s ease;pointer-events:none;z-index:14}
.social-link:hover::after{opacity:1}
.hub-glow{position:absolute;inset:-3px;border-radius:23px;opacity:0;transition:opacity 0.5s ease,filter 0.5s ease;pointer-events:none;z-index:-1;filter:blur(16px)}
.social-link:hover .hub-glow{opacity:1}
.hub-bg{position:absolute;inset:0;border-radius:20px;opacity:0;transition:opacity 0.5s ease;pointer-events:none;z-index:1}
.social-link:hover .hub-bg{opacity:1}
.hub-shine{position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.1) 40%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0.1) 60%,transparent 100%);transform:skewX(-25deg);pointer-events:none;z-index:13;transition:none}
.social-link:hover .hub-shine{animation:hubShine 0.9s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes hubShine{to{left:200%}}
.hub-reflection{position:absolute;bottom:0;left:5%;right:5%;height:40%;background:linear-gradient(to top,rgba(255,255,255,0.035),transparent);border-radius:0 0 20px 20px;pointer-events:none;z-index:12}
.hub-edge{position:absolute;inset:0;border-radius:20px;border:1.5px solid transparent;opacity:0;transition:opacity 0.5s ease,border-color 0.5s ease,box-shadow 0.5s ease;pointer-events:none;z-index:11}
.social-link:hover .hub-edge{opacity:1}
.hub-edge::after{content:'';position:absolute;top:-1px;left:-60%;width:30%;height:calc(100% + 2px);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);animation:edgeShimmer 5s ease-in-out infinite;pointer-events:none;border-radius:20px}
@keyframes edgeShimmer{0%,100%{left:-30%}50%{left:100%}}
.hub-ripple{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);transform:translate(-50%,-50%) scale(0);animation:rippleOut 0.7s ease-out forwards;pointer-events:none;z-index:20}
@keyframes rippleOut{to{transform:translate(-50%,-50%) scale(50);opacity:0}}
.social-icon{font-size:28px;flex-shrink:0;transition:all 0.5s cubic-bezier(0.16,1,0.3,1);position:relative;z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.social-text{position:relative;z-index:5;transition:all 0.4s ease}
.social-text .text-sm{font-weight:600;font-size:15px;letter-spacing:0.3px}
.social-arrow{margin-left:auto;opacity:0;transform:translateX(-10px);transition:all 0.5s cubic-bezier(0.16,1,0.3,1);color:#00e5ff;z-index:5;position:relative;filter:drop-shadow(0 0 4px rgba(0,229,255,0.4))}
.social-link:hover .social-arrow{opacity:0.8;transform:translateX(0)}
.social-link:hover .social-icon{transform:scale(1.2) rotateY(12deg)}
.social-links-wrap:hover .social-link:not(:hover){opacity:0.45;filter:brightness(0.6) saturate(0.5);transform:scale(0.98)}

.social-link.facebook .hub-glow{background:rgba(24,119,242,0.35)}
.social-link.facebook .hub-bg{background:linear-gradient(135deg,rgba(24,119,242,0.14),rgba(24,119,242,0.02))}
.social-link.facebook .hub-edge{border-color:rgba(24,119,242,0.45);box-shadow:0 0 20px rgba(24,119,242,0.15),inset 0 0 20px rgba(24,119,242,0.05)}
.social-link.facebook:hover{box-shadow:0 12px 40px rgba(24,119,242,0.3),0 0 0 1px rgba(24,119,242,0.3),0 0 60px rgba(24,119,242,0.08),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 0 40px rgba(24,119,242,0.06)}
.social-link.facebook .social-icon{color:#1877F2}
.social-link.facebook:hover .social-icon::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(24,119,242,0.5);animation:fbPulse 1.2s ease-out infinite}
.social-link.facebook:hover .social-icon::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(24,119,242,0.3);animation:fbPulse 1.2s ease-out 0.4s infinite}
@keyframes fbPulse{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2);opacity:0}}
.social-link.facebook .fb-particles{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden}
.social-link.facebook:hover .fb-particles span{position:absolute;top:50%;left:22%;width:3px;height:3px;border-radius:50%;background:#1877F2;opacity:0;animation:fbBurst 1.5s ease-out infinite}
.social-link.facebook:hover .fb-particles span:nth-child(1){animation-delay:0s}.social-link.facebook:hover .fb-particles span:nth-child(2){animation-delay:0.2s}.social-link.facebook:hover .fb-particles span:nth-child(3){animation-delay:0.4s}.social-link.facebook:hover .fb-particles span:nth-child(4){animation-delay:0.6s}.social-link.facebook:hover .fb-particles span:nth-child(5){animation-delay:0.8s}
@keyframes fbBurst{0%{transform:translate(0,0) scale(1);opacity:0.8}100%{transform:translate(var(--bx,20px),var(--by,-30px)) scale(0);opacity:0}}

.social-link.instagram .hub-glow{background:linear-gradient(135deg,rgba(225,48,108,0.3),rgba(131,58,180,0.3))}
.social-link.instagram .hub-bg{background:linear-gradient(135deg,rgba(225,48,108,0.12),rgba(131,58,180,0.06),rgba(252,175,69,0.06))}
.social-link.instagram .social-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 6px rgba(225,48,108,0.4))}
.social-link.instagram .hub-edge{inset:-2px;border-radius:22px;border:none;background:conic-gradient(from var(--ig-rot),#f09433,#e6683c,#dc2743,#cc2366,#bc1888,#f09433);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:2px;opacity:0;filter:blur(0.5px)}
.social-link.instagram:hover .hub-edge{opacity:0.8;animation:igSpin 3s linear infinite}
@keyframes igSpin{to{--ig-rot:360deg}}
.social-link.instagram:hover{box-shadow:0 12px 40px rgba(225,48,108,0.25),0 0 0 1px rgba(225,48,108,0.25),0 0 60px rgba(131,58,180,0.08),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 0 40px rgba(225,48,108,0.04)}
.social-link.instagram .ig-flash{position:absolute;inset:0;background:rgba(255,255,255,0.15);opacity:0;pointer-events:none;z-index:16;border-radius:20px;transition:none}
.social-link.instagram:hover .ig-flash{animation:igFlash 0.3s ease-out}
@keyframes igFlash{0%{opacity:0.6}100%{opacity:0}}
.social-link.instagram .ig-rainbow{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity 0.5s ease;background:linear-gradient(90deg,transparent 0%,rgba(240,148,51,0.05) 20%,rgba(220,39,67,0.05) 40%,rgba(188,24,136,0.05) 60%,rgba(131,58,180,0.05) 80%,transparent 100%);background-size:200% 100%;animation:igRainbow 3s ease-in-out infinite}
.social-link.instagram:hover .ig-rainbow{opacity:1}
@keyframes igRainbow{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}

.social-link.tiktok .hub-glow{background:linear-gradient(135deg,rgba(255,0,80,0.3),rgba(0,242,234,0.3))}
.social-link.tiktok .hub-bg{background:linear-gradient(135deg,rgba(255,0,80,0.12),rgba(0,242,234,0.06))}
.social-link.tiktok .hub-edge{border-color:rgba(255,0,80,0.4);box-shadow:0 0 20px rgba(255,0,80,0.12),0 0 20px rgba(0,242,234,0.12),inset 0 0 20px rgba(255,0,80,0.04);animation:tiktokFlicker 2s ease-in-out infinite}
@keyframes tiktokFlicker{0%,100%{border-color:rgba(255,0,80,0.4)}50%{border-color:rgba(0,242,234,0.5)}}

.share-btn{position:fixed;bottom:24px;right:24px;z-index:50;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#00e5ff,#7c3aed);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;box-shadow:0 8px 30px -6px rgba(0,229,255,0.5),0 0 20px rgba(124,58,237,0.3),inset 0 1px 0 rgba(255,255,255,0.2);transition:all 0.3s ease}

/* ========================================
   === ROBOT AI COMPANION — SIÊU ĐẸP ===
   ======================================== */
.robot-container{position:fixed;bottom:24px;left:24px;z-index:40;cursor:grab;touch-action:none;transition:filter 0.3s ease;-webkit-user-select:none;user-select:none}
.robot-container:active{cursor:grabbing}
.robot-container:hover .robot-glow-bg{opacity:0.6}
.robot-glow-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.12) 0%,rgba(124,58,237,0.06) 40%,transparent 70%);filter:blur(20px);opacity:0.3;transition:opacity 0.5s ease;pointer-events:none}

.robot{position:relative;width:80px;animation:robotFloat 3.5s ease-in-out infinite;transform-origin:bottom center}
@keyframes robotFloat{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-10px) rotate(1.5deg)}50%{transform:translateY(-6px) rotate(0deg)}75%{transform:translateY(-12px) rotate(-1.5deg)}}

/* Antenna */
.robot-antenna{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:2px;height:20px;background:linear-gradient(to top,rgba(0,229,255,0.3),rgba(0,229,255,0.7));z-index:3}
.antenna-ball{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#00e5ff;box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.5),0 0 50px rgba(0,229,255,0.2);animation:antennaPulse 2s ease-in-out infinite}
@keyframes antennaPulse{0%,100%{box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.5);transform:translateX(-50%) scale(1)}50%{box-shadow:0 0 18px #00e5ff,0 0 35px rgba(0,229,255,0.7),0 0 60px rgba(0,229,255,0.3);transform:translateX(-50%) scale(1.25)}}
.antenna-ball.flash{animation:antennaFlash 0.4s ease!important}
@keyframes antennaFlash{0%{box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.5);transform:translateX(-50%) scale(1)}30%{box-shadow:0 0 30px #ffffff,0 0 60px #00e5ff,0 0 80px rgba(0,229,255,0.8);transform:translateX(-50%) scale(1.6)}100%{box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.5);transform:translateX(-50%) scale(1)}}

/* Head */
.robot-head{width:62px;height:52px;margin:0 auto;background:linear-gradient(155deg,#1a2545 0%,#111b33 40%,#0d1528 100%);border-radius:18px 18px 14px 14px;border:1.5px solid rgba(0,229,255,0.2);box-shadow:0 6px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08),inset 0 -1px 0 rgba(0,0,0,0.3),0 0 25px rgba(0,229,255,0.06);position:relative;overflow:visible;z-index:2}
.robot-head::before{content:'';position:absolute;top:2px;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.35),transparent);z-index:5}
.robot-head::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:12px;background:linear-gradient(to top,rgba(0,229,255,0.03),transparent);border-radius:0 0 14px 14px;pointer-events:none}

/* Ears */
.robot-ear{position:absolute;top:16px;width:5px;height:14px;background:linear-gradient(155deg,#1a2545,#0d1528);border:1px solid rgba(0,229,255,0.15);z-index:1}
.robot-ear.left{left:-4px;border-radius:4px 0 0 4px;border-right:none}
.robot-ear.right{right:-4px;border-radius:0 4px 4px 0;border-left:none}
.robot-ear::after{content:'';position:absolute;top:3px;left:1px;right:1px;height:3px;border-radius:1px;background:rgba(0,229,255,0.3);box-shadow:0 0 4px rgba(0,229,255,0.3)}

/* Face */
.robot-face{position:relative;display:flex;align-items:center;justify-content:center;gap:16px;padding-top:15px;z-index:3}

/* Eyes */
.robot-eye{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#0c1220,#060a14);border:1.5px solid rgba(0,229,255,0.3);position:relative;overflow:hidden;box-shadow:inset 0 0 6px rgba(0,229,255,0.12),0 0 8px rgba(0,229,255,0.08);transition:height 0.1s ease,border-radius 0.1s ease,margin-top 0.1s ease}
.robot-eye.blink{height:2px!important;border-radius:2px!important;margin-top:7px!important}
.robot-eye.sleepy{height:8px!important;margin-top:4px!important;border-radius:8px 8px 4px 4px!important}
.robot-pupil{width:7px;height:7px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff 0%,#00e5ff 50%,#0099aa 100%);box-shadow:0 0 8px #00e5ff,0 0 16px rgba(0,229,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform 0.06s linear;will-change:transform}
.robot-pupil::after{content:'';position:absolute;top:1px;right:1px;width:2.5px;height:2.5px;border-radius:50%;background:rgba(255,255,255,0.9)}
.robot-pupil::before{content:'';position:absolute;bottom:2px;left:1.5px;width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.3)}

/* Mouth */
.robot-mouth{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:2.5px;z-index:3;transition:all 0.3s ease}
.mouth-led{width:3px;height:3px;border-radius:50%;background:rgba(0,229,255,0.25);transition:all 0.3s ease}
.robot-mouth.happy .mouth-led{background:#00e5ff;box-shadow:0 0 5px rgba(0,229,255,0.6)}
.robot-mouth.happy .mouth-led:nth-child(1),.robot-mouth.happy .mouth-led:nth-child(5){opacity:0.4}
.robot-mouth.happy .mouth-led:nth-child(2),.robot-mouth.happy .mouth-led:nth-child(4){opacity:0.8;transform:scale(1.1)}
.robot-mouth.happy .mouth-led:nth-child(3){opacity:1;transform:scale(1.3);box-shadow:0 0 8px rgba(0,229,255,0.8)}
.robot-mouth.surprised{gap:0;width:10px;height:10px;border-radius:50%;background:rgba(0,229,255,0.15);border:1.5px solid rgba(0,229,255,0.35);padding:0}
.robot-mouth.surprised .mouth-led{display:none}
.robot-mouth.love .mouth-led{background:#f472b6;box-shadow:0 0 5px rgba(244,114,182,0.6)}

/* Neck connector */
.robot-neck{width:16px;height:4px;margin:0 auto;background:linear-gradient(to right,rgba(0,229,255,0.1),rgba(0,229,255,0.2),rgba(0,229,255,0.1));border-radius:0 0 3px 3px;position:relative;z-index:1}

/* Body */
.robot-body{width:52px;height:36px;margin:0 auto;background:linear-gradient(155deg,#172040 0%,#101830 40%,#0b1222 100%);border-radius:10px 10px 14px 14px;border:1.5px solid rgba(0,229,255,0.15);position:relative;box-shadow:0 6px 18px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05),0 0 20px rgba(0,229,255,0.04);z-index:2}
.robot-body::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.2),transparent)}

/* Chest core */
.robot-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#a855f7,#7c3aed 60%,#5b21b6);box-shadow:0 0 10px #7c3aed,0 0 25px rgba(124,58,237,0.4),0 0 45px rgba(124,58,237,0.15);animation:corePulse 1.8s ease-in-out infinite}
@keyframes corePulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1);box-shadow:0 0 10px #7c3aed,0 0 25px rgba(124,58,237,0.4)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);box-shadow:0 0 15px #7c3aed,0 0 35px rgba(124,58,237,0.6),0 0 55px rgba(124,58,237,0.2)}}

/* Chest lines */
.robot-body-lines{position:absolute;inset:4px 8px;pointer-events:none}
.robot-body-lines::before{content:'';position:absolute;top:4px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.08),transparent)}
.robot-body-lines::after{content:'';position:absolute;bottom:4px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.08),transparent)}

/* Arms */
.robot-arm{position:absolute;width:9px;height:22px;background:linear-gradient(155deg,#172040,#0b1222);border:1px solid rgba(0,229,255,0.12);top:4px;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);z-index:1}
.robot-arm.left{left:-10px;border-radius:5px 5px 5px 10px;transform:rotate(12deg);border-right:none}
.robot-arm.right{right:-10px;border-radius:5px 5px 10px 5px;transform:rotate(-12deg);border-left:none}
.robot-arm.left::after,.robot-arm.right::after{content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:linear-gradient(155deg,#172040,#0b1222);border:1px solid rgba(0,229,255,0.1)}
.robot-arm.right.wave{animation:armWave 0.5s ease-in-out 3}
@keyframes armWave{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(-50deg)}}

/* Feet */
.robot-feet{display:flex;justify-content:center;gap:14px;margin-top:-1px;position:relative;z-index:1}
.robot-foot{width:16px;height:6px;background:linear-gradient(155deg,#151d38,#0b1222);border:1px solid rgba(0,229,255,0.1);border-top:none;border-radius:0 0 5px 5px;box-shadow:0 3px 8px rgba(0,0,0,0.3)}

/* Shadow */
.robot-shadow{width:55px;height:10px;margin:6px auto 0;background:radial-gradient(ellipse,rgba(0,229,255,0.12) 0%,rgba(0,229,255,0.04) 50%,transparent 70%);border-radius:50%;animation:shadowPulse 3.5s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{transform:scaleX(1);opacity:0.7}25%{transform:scaleX(0.8);opacity:0.3}50%{transform:scaleX(0.9);opacity:0.5}75%{transform:scaleX(0.75);opacity:0.25}}

/* Holographic rings */
.holo-ring{position:absolute;top:50%;left:50%;border-radius:50%;pointer-events:none;z-index:0}
.holo-ring-1{width:100px;height:100px;border:1px solid rgba(0,229,255,0.1);transform:translate(-50%,-50%) rotateX(72deg);animation:holoSpin1 6s linear infinite}
.holo-ring-1::after{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#00e5ff;box-shadow:0 0 8px #00e5ff,0 0 16px rgba(0,229,255,0.4)}
.holo-ring-2{width:85px;height:85px;border:1px solid rgba(124,58,237,0.08);transform:translate(-50%,-50%) rotateX(72deg) rotateY(50deg);animation:holoSpin2 8s linear infinite reverse}
.holo-ring-2::after{content:'';position:absolute;top:-2.5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#7c3aed;box-shadow:0 0 6px #7c3aed,0 0 14px rgba(124,58,237,0.4)}
@keyframes holoSpin1{to{transform:translate(-50%,-50%) rotateX(72deg) rotateZ(360deg)}}
@keyframes holoSpin2{to{transform:translate(-50%,-50%) rotateX(72deg) rotateY(50deg) rotateZ(360deg)}}

/* Floating holographic symbols */
.robot-holo-symbols{position:absolute;inset:-35px;pointer-events:none;z-index:0}
.holo-sym{position:absolute;top:50%;left:50%;font-family:'Orbitron',sans-serif;font-size:7px;font-weight:600;color:rgba(0,229,255,0.35);text-shadow:0 0 5px rgba(0,229,255,0.25);animation:holoSymFloat 5s ease-in-out infinite;animation-delay:var(--d,0s);opacity:0;will-change:transform,opacity;transform:translate(var(--x,0px),var(--y,0px)) scale(0.7)}
@keyframes holoSymFloat{0%,100%{opacity:0;transform:translate(var(--x,0px),var(--y,0px)) scale(0.7)}15%{opacity:0.5}50%{opacity:0.6;transform:translate(calc(var(--x,0px) + 4px),calc(var(--y,0px) - 10px)) scale(1)}85%{opacity:0.4}}

/* Robot particles */
.robot-particles{position:absolute;inset:-25px;pointer-events:none;z-index:0}
.r-particle{position:absolute;top:50%;left:50%;width:2.5px;height:2.5px;border-radius:50%;background:var(--pc,#00e5ff);box-shadow:0 0 5px var(--pc,#00e5ff);opacity:0;animation:rPartFloat 4.5s ease-in-out infinite;animation-delay:var(--pd,0s);will-change:transform,opacity}
@keyframes rPartFloat{0%,100%{transform:translate(calc(var(--px,0px) - 1.25px),calc(var(--py,0px) - 1.25px)) scale(0);opacity:0}25%{opacity:0.6;transform:translate(calc(var(--px,0px) - 1.25px),calc(var(--py,0px) - 1.25px - 12px)) scale(1)}50%{opacity:0.4;transform:translate(calc(var(--px,0px) - 1.25px + 6px),calc(var(--py,0px) - 1.25px - 18px)) scale(0.7)}75%{opacity:0.2}}

/* Speech bubble */
.robot-speech{position:absolute;bottom:calc(100% + 16px);left:50%;transform:translateX(-50%) scale(0) translateY(8px);background:rgba(8,12,25,0.95);border:1px solid rgba(0,229,255,0.25);border-radius:14px;padding:9px 16px;font-size:11px;font-weight:600;color:#e2e8f0;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.6),0 0 20px rgba(0,229,255,0.08),inset 0 1px 0 rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all 0.45s cubic-bezier(0.16,1,0.3,1);pointer-events:none;z-index:100;letter-spacing:0.3px}

.robot-speech.show{transform:translateX(-50%) scale(1) translateY(0)}

<script>
// ============================
// CHỐNG THU PHÓNG / COPY
// ============================
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'){e.preventDefault();return false}if(e.ctrlKey&&e.shiftKey&&['I','i','J','j','C','c'].includes(e.key)){e.preventDefault();return false}if(e.ctrlKey&&['U','u'].includes(e.key)){e.preventDefault();return false}if(e.ctrlKey&&['S','s'].includes(e.key)){e.preventDefault();return false}if(e.ctrlKey&&['C','c'].includes(e.key)){e.preventDefault();return false}if(e.ctrlKey&&['P','p'].includes(e.key)){e.preventDefault();return false}if(e.ctrlKey&&e.shiftKey&&['U','u'].includes(e.key)){e.preventDefault();return false}});
document.addEventListener('dragstart',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=n},{passive:false});
document.addEventListener('copy',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('wheel',e=>{if(e.ctrlKey)e.preventDefault()},{passive:false});

// ============================
// NHẠC — YouTube IFrame API
// ============================
let ytPlayer=null,playerReady=false;
const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);
function onYouTubeIframeAPIReady(){ytPlayer=new YT.Player('ytPlayer',{width:'1',height:'1',videoId:'ECLfqo75Qh8',playerVars:{autoplay:1,loop:1,playlist:'ECLfqo75Qh8',controls:0,showinfo:0,modestbranding:1,rel:0,fs:0,iv_load_policy:3,disablekb:1},events:{'onReady':onPlayerReady,'onStateChange':onPlayerStateChange}})}
function onPlayerReady(e){playerReady=true;e.target.setVolume(100);e.target.playVideo()}
function onPlayerStateChange(e){if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.CUED)tryPlay()}
function tryPlay(){if(ytPlayer&&playerReady)try{ytPlayer.setVolume(100);ytPlayer.playVideo()}catch(e){}}
function forcePlay(){tryPlay();['click','touchstart','touchend','scroll','keydown','pointerdown'].forEach(ev=>document.removeEventListener(ev,forcePlay))}
['click','touchstart','touchend','scroll','keydown','pointerdown'].forEach(ev=>document.addEventListener(ev,forcePlay));
let retryCount=0;
let playRetry=setInterval(()=>{retryCount++;if(ytPlayer&&playerReady&&ytPlayer.getPlayerState){try{if(ytPlayer.getPlayerState()!==YT.PlayerState.PLAYING){ytPlayer.setVolume(100);ytPlayer.playVideo()}else{clearInterval(playRetry)}}catch(e){}}if(retryCount>40)clearInterval(playRetry)},500);

// ============================
// HIỆN CÁC PHẦN TỬ
// ============================
function revealElements(){document.querySelectorAll('.reveal').forEach(el=>{if(el.getBoundingClientRect().top<window.innerHeight-40)el.classList.add('active')})}
window.addEventListener('scroll',revealElements);
document.body.addEventListener('scroll',revealElements);
window.addEventListener('load',revealElements);
setTimeout(revealElements,1000);

// ============================
// SAO BĂNG 3D (Canvas)
// ============================
const cvs=document.getElementById('particles'),cx=cvs.getContext('2d');
let stars=[],shootingStars=[];
function rsz(){cvs.width=innerWidth;cvs.height=innerHeight}
rsz();addEventListener('resize',rsz);

class Star{
  constructor(layer){this.layer=layer;this.reset(true)}
  reset(init){
    this.x=Math.random()*cvs.width;this.y=init?Math.random()*cvs.height:-2;
    const cfg=[{s:0.5+Math.random()*0.4,sp:0.08,a:0.18+Math.random()*0.12},{s:0.9+Math.random()*0.6,sp:0.2,a:0.35+Math.random()*0.15},{s:1.3+Math.random()*0.9,sp:0.4,a:0.55+Math.random()*0.2}];
    const c=cfg[this.layer];this.s=c.s;this.speed=c.sp;this.baseAlpha=c.a;
    this.twinkleSpeed=0.015+Math.random()*0.025;this.twinkleOffset=Math.random()*Math.PI*2;
    const colors=['255,255,255','0,229,255','180,160,255','120,200,255','255,220,180'];
    this.rgb=colors[Math.floor(Math.random()*colors.length)];
  }
  update(t){this.y+=this.speed;if(this.y>cvs.height+5)this.reset(false);this.alpha=this.baseAlpha*(0.4+0.6*Math.sin(t*this.twinkleSpeed+this.twinkleOffset))}
  draw(){
    cx.beginPath();cx.arc(this.x,this.y,this.s,0,Math.PI*2);
    cx.fillStyle='rgba('+this.rgb+','+Math.max(0,this.alpha)+')';cx.fill();
    if(this.layer===2&&this.alpha>0.45){cx.beginPath();cx.arc(this.x,this.y,this.s*3.5,0,Math.PI*2);cx.fillStyle='rgba('+this.rgb+','+(this.alpha*0.12)+')';cx.fill()}
  }
}

class ShootingStar{
  constructor(){this.active=false}
  launch(){this.active=true;this.x=Math.random()*cvs.width*0.8;this.y=Math.random()*cvs.height*0.4;this.len=50+Math.random()*80;this.speed=7+Math.random()*5;this.angle=Math.PI/5+(Math.random()-0.5)*0.4;this.alpha=1;this.decay=0.012+Math.random()*0.008}
  update(){if(!this.active)return;this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.alpha-=this.decay;if(this.alpha<=0)this.active=false}
  draw(){if(!this.active)return;const tx=this.x-Math.cos(this.angle)*this.len;const ty=this.y-Math.sin(this.angle)*this.len;const g=cx.createLinearGradient(tx,ty,this.x,this.y);g.addColorStop(0,'rgba(0,229,255,0)');g.addColorStop(0.7,'rgba(0,229,255,'+this.alpha*0.5+')');g.addColorStop(1,'rgba(255,255,255,'+this.alpha+')');cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(this.x,this.y);cx.strokeStyle=g;cx.lineWidth=1.5;cx.stroke();cx.beginPath();cx.arc(this.x,this.y,2,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,'+this.alpha+')';cx.fill()}
}

for(let i=0;i<50;i++)stars.push(new Star(0));
for(let i=0;i<28;i++)stars.push(new Star(1));
for(let i=0;i<14;i++)stars.push(new Star(2));
for(let i=0;i<3;i++)shootingStars.push(new ShootingStar());

let frameCount=0;
function animateStars(){
  frameCount++;cx.clearRect(0,0,cvs.width,cvs.height);
  stars.forEach(s=>{s.update(frameCount);s.draw()});
  shootingStars.forEach(ss=>{ss.update();ss.draw()});
  if(Math.random()<0.004){const idle=shootingStars.find(s=>!s.active);if(idle)idle.launch()}
  requestAnimationFrame(animateStars);
}
animateStars();

// ============================
// 3D TILT EFFECT CHO HUBS
// ============================
document.querySelectorAll('.social-link').forEach(hub=>{
  let rafId=null;
  let isHovered=false;
  hub.addEventListener('mouseenter',()=>{isHovered=true});
  hub.addEventListener('mouseleave',()=>{isHovered=false;hub.style.transform='';hub.style.setProperty('--gx','50%');hub.style.setProperty('--gy','50%')});
  hub.addEventListener('mousemove',e=>{
    if(!isHovered)return;
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(()=>{
      const rect=hub.getBoundingClientRect();
      const x=(e.clientX-rect.left)/rect.width;
      const y=(e.clientY-rect.top)/rect.height;
      const rotateX=(0.5-y)*14;
      const rotateY=(x-0.5)*14;
      hub.style.transform='perspective(800px) rotateX('+rotateX+'deg) rotateY('+rotateY+'deg) translateZ(12px) scale(1.03)';
      hub.style.setProperty('--gx',(x*100)+'%');
      hub.style.setProperty('--gy',(y*100)+'%');
      rafId=null;
    });
  });
  hub.addEventListener('touchstart',()=>{hub.style.transform='perspective(800px) rotateX(-3deg) rotateY(3deg) translateZ(10px) scale(1.04)';hub.style.setProperty('--gx','35%');hub.style.setProperty('--gy','35%')},{passive:true});
  hub.addEventListener('touchend',()=>{hub.style.transform='';hub.style.setProperty('--gx','50%');hub.style.setProperty('--gy','50%')},{passive:true});
  hub.addEventListener('pointerdown',e=>{
    const rect=hub.getBoundingClientRect();
    const ripple=document.createElement('span');
    ripple.className='hub-ripple';
    ripple.style.left=(e.clientX-rect.left)+'px';
    ripple.style.top=(e.clientY-rect.top)+'px';
    hub.appendChild(ripple);
    ripple.addEventListener('animationend',()=>ripple.remove());
  });
});

function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockHM').textContent=h+':'+m;
  document.getElementById('clockSec').textContent=':'+s;
  const days=['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  document.getElementById('clockDate').textContent=days[now.getDay()]+', '+now.getDate()+'/'+months[now.getMonth()]+'/'+now.getFullYear();
  const offset=-now.getTimezoneOffset()/60;
  document.getElementById('clockTzOffset').textContent='UTC'+(offset>=0?'+':'')+offset;
}
updateClock();
setInterval(updateClock,1000);

async function loadIP(){
  const card=document.getElementById('ipCard');
  const body=document.getElementById('ipBody');
  const icon=document.getElementById('statusIcon');
  try{
    const r=await fetch('https://ipapi.co/json/');
    const d=await r.json();
    icon.innerHTML='<span class="iconify" data-icon="mdi:check-circle" data-width="16" style="color:#22c55e"></span>';
    card.classList.add('visible');
    const rows=[
      {l:'mdi:ip-network',t:'IP',v:d.ip,p:true,b:d.version==='IPv4'?'ipv4':'ipv6',bt:d.version||'IPv4'},
      {l:'mdi:map-marker',t:'Vị trí',v:(d.city||'')+', '+(d.region||'')+', '+(d.country_name||'')},
      {l:'mdi:earth',t:'Quốc gia',v:(d.country_name||'')+' ('+(d.country_code||'')+')'},
      {l:'mdi:provider',t:'ISP',v:d.org||'N/A'},
      {l:'mdi:clock-outline',t:'Múi giờ',v:d.timezone||'N/A'},
      {l:'mdi:crosshairs-gps',t:'Tọa độ',v:(d.latitude||'?')+', '+(d.longitude||'?')},
    ];
    body.innerHTML='';
    rows.forEach((row,i)=>{
      const div=document.createElement('div');
      div.className='ip-row';
      let valHtml='<span class="ip-value'+(row.p?' primary':'')+'">'+row.v+'</span>';
      if(row.b)valHtml+=' <span class="ip-badge '+row.bt+' ml-2">'+row.bt+'</span>';
      if(row.p)valHtml='<div class="flex items-center gap-2">'+valHtml+'<button class="ip-copy-btn" onclick="copyIP(\''+row.v+'\')"><span class="iconify" data-icon="mdi:content-copy" data-width="12"></span>Sao chép</button></div>';
      div.innerHTML='<span class="ip-label"><span class="iconify" data-icon="'+row.l+'" data-width="15"></span>'+row.t+'</span>'+valHtml;
      body.appendChild(div);
      setTimeout(()=>div.classList.add('show'),150+i*100);
    });
  }catch(e){
    icon.innerHTML='<span class="iconify" data-icon="mdi:alert-circle" data-width="16" style="color:#ef4444"></span>';
    card.classList.add('visible');
    body.innerHTML='<div class="ip-row show"><span class="ip-label"><span class="iconify" data-icon="mdi:alert" data-width="15"></span>Lỗi</span><span class="ip-value" style="color:#ef4444">Không thể tải dữ liệu</span></div>';
  }
}
function copyIP(ip){
  navigator.clipboard.writeText(ip).then(()=>{
    document.querySelectorAll('.ip-copy-btn').forEach(b=>{b.classList.add('copied');b.innerHTML='<span class="iconify" data-icon="mdi:check" data-width="12"></span>Đã chép!';setTimeout(()=>{b.classList.remove('copied');b.innerHTML='<span class="iconify" data-icon="mdi:content-copy" data-width="12"></span>Sao chép'},1500)});
  }).catch(()=>{});
}
setTimeout(loadIP,800);

// ================================================
// ================================================
// === ROBOT AI COMPANION — HỆ THỐNG THÔNG MINH ===
// ================================================
// ================================================

(function(){
  const container = document.getElementById('robotContainer');
  const robot = document.getElementById('robot');
  const eyeL = document.getElementById('eyeLeft');
  const eyeR = document.getElementById('eyeRight');
  const pupilL = document.getElementById('pupilLeft');
  const pupilR = document.getElementById('pupilRight');
  const mouth = document.getElementById('robotMouth');
  const armR = document.getElementById('armRight');
  const armL = document.getElementById('armLeft');
  const antenna = document.getElementById('antennaBall');
  const speech = document.getElementById('robotSpeech');
  const zzz = document.getElementById('robotZzz');

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let isDragging = false;
  let dragStarted = false;
  let dragOffsetX = 0, dragOffsetY = 0;
  let lastInteraction = Date.now();
  let isSleeping = false;
  let isWaking = true; // initial wake sequence
  let speechTimeout = null;
  let clickCount = 0;
  let clickTimer = null;

  // --- Messages ---
  const messages = [
    'Xin chào bạn! 👋',
    'Tôi là AI Bot 🤖',
    'Kéo tôi đi nào! ✨',
    'Trang web đẹp quá 💫',
    'Nhấp vào tôi nhé! 😊',
    'Đang phân tích... 🔍',
    'Hệ thống OK ✅',
    'Bạn biết không? 🤔',
    'Tôi rất thông minh! 🧠',
    '01101000 01101001 😄',
    'Hôm nay vui không? 🌟',
    'Cho tôi ăn dữ liệu! 🍔',
  ];
  let msgIndex = 0;

  // --- Eye Tracking ---
  function updateEyes(){
    if(isSleeping || isWaking) return;
    [eyeL, eyeR].forEach((eye, i) => {
      const pupil = i === 0 ? pupilL : pupilR;
      const rect = eye.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const angle = Math.atan2(mouseY - cy, mouseX - cx);
      const dist = Math.min(3, Math.hypot(mouseX - cx, mouseY - cy) / 60);
      const ox = Math.cos(angle) * dist;
      const oy = Math.sin(angle) * dist;
      pupil.style.transform = 'translate(calc(-50% + ' + ox + 'px), calc(-50% + ' + oy + 'px))';
    });
    requestAnimationFrame(updateEyes);
  }

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    wakeUp();
  });
  document.addEventListener('touchmove', e => {
    if(e.touches.length){
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }
    wakeUp();
  }, {passive:true});

  // --- Blinking ---
  function blink(){
    if(isSleeping || isWaking) { scheduleBlink(); return; }
    eyeL.classList.add('blink');
    eyeR.classList.add('blink');
    setTimeout(() => {
      eyeL.classList.remove('blink');
      eyeR.classList.remove('blink');
    }, 120);
    scheduleBlink();
  }
  function scheduleBlink(){
    setTimeout(blink, 2000 + Math.random() * 4000);
  }

  // --- Speech ---
  function showSpeech(msg){
    speech.textContent = msg;
    speech.classList.add('show');
    clearTimeout(speechTimeout);
    speechTimeout = setTimeout(() => speech.classList.remove('show'), 3500);
  }
  function hideSpeech(){
    speech.classList.remove('show');
    clearTimeout(speechTimeout);
  }

  // --- Wake Up Sequence ---
  function startWakeSequence(){
    isWaking = true;
    // Eyes start closed (blink class already on)
    setTimeout(() => {
      eyeL.classList.remove('blink');
      eyeR.classList.remove('blink');
      showSpeech('Đang khởi động... ⚡');
    }, 1200);
    setTimeout(() => {
      showSpeech('Hệ thống sẵn sàng! ✅');
    }, 2800);
    setTimeout(() => {
      isWaking = false;
      showSpeech('Xin chào bạn! 👋');
      scheduleBlink();
      requestAnimationFrame(updateEyes);
      startIdleCheck();
    }, 4200);
  }

  // --- Sleep / Wake ---
  function goToSleep(){
    if(isSleeping) return;
    isSleeping = true;
    hideSpeech();
    eyeL.classList.add('sleepy');
    eyeR.classList.add('sleepy');
    mouth.className = 'robot-mouth';
    zzz.classList.add('show');
    showSpeech('Zzz... 💤');
  }
  function wakeUp(){
    lastInteraction = Date.now();
    if(!isSleeping) return;
    isSleeping = false;
    eyeL.classList.remove('sleepy','blink');
    eyeR.classList.remove('sleepy','blink');
    zzz.classList.remove('show');
    hideSpeech();
    // Quick happy expression
    mouth.classList.add('happy');
    setTimeout(() => mouth.classList.remove('happy'), 800);
  }
  function startIdleCheck(){
    setInterval(() => {
      if(!isSleeping && !isWaking && Date.now() - lastInteraction > 12000){
        goToSleep();
      }
    }, 2000);
  }

  // --- Click Reactions ---
  function onRobotClick(){
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 400);

    if(clickCount === 2){
      // Double click — love reaction
      onRobotDoubleClick();
      clickCount = 0;
      return;
    }

    // Single click — wave + happy + speech
    armR.classList.remove('wave');
    void armR.offsetWidth;
    armR.classList.add('wave');
    setTimeout(() => armR.classList.remove('wave'), 1600);

    mouth.classList.remove('surprised','love');
    mouth.classList.add('happy');
    setTimeout(() => mouth.classList.remove('happy'), 1500);

    antenna.classList.remove('flash');
    void antenna.offsetWidth;
    antenna.classList.add('flash');
    setTimeout(() => antenna.classList.remove('flash'), 400);

    showSpeech(messages[msgIndex % messages.length]);
    msgIndex++;

    // Spawn a small heart sometimes
    if(Math.random() > 0.5) spawnHeart();
  }

  function onRobotDoubleClick(){
    // Love reaction
    mouth.classList.remove('happy','surprised');
    mouth.classList.add('love');
    setTimeout(() => mouth.classList.remove('love'), 2000);

    antenna.classList.remove('flash');
    void antenna.offsetWidth;
    antenna.classList.add('flash');
    setTimeout(() => antenna.classList.remove('flash'), 400);

    showSpeech('Yêu bạn! 💕');
    for(let i = 0; i < 5; i++){
      setTimeout(() => spawnHeart(), i * 150);
    }
  }

  function spawnHeart(){
    const heart = document.createElement('div');
    heart.className = 'love-heart';
    heart.textContent = '♥';
    heart.style.left = (20 + Math.random() * 40) + 'px';
    heart.style.top = (10 + Math.random() * 20) + 'px';
    robot.appendChild(heart);
    heart.addEventListener('animationend', () => heart.remove());
  }

  // --- Dragging ---
  container.addEventListener('pointerdown', e => {
    isDragging = true;
    dragStarted = false;
    const rect = container.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    container.style.transition = 'filter 0.3s ease';
    container.style.bottom = 'auto';
    container.style.left = rect.left + 'px';
    container.style.top = rect.top + 'px';
    container.setPointerCapture(e.pointerId);
    e.preventDefault();
    wakeUp();
  });

  container.addEventListener('pointermove', e => {
    if(!isDragging) return;
    dragStarted = true;
    const x = Math.max(0, Math.min(window.innerWidth - 80, e.clientX - dragOffsetX));
    const y = Math.max(0, Math.min(window.innerHeight - 100, e.clientY - dragOffsetY));
    container.style.left = x + 'px';
    container.style.top = y + 'px';
    // Tilt robot slightly in drag direction
    const dx = (e.clientX - dragOffsetX + 40 - window.innerWidth/2) / window.innerWidth * 8;
    robot.style.animation = 'none';
    robot.style.transform = 'rotate(' + dx + 'deg)';
  });

  container.addEventListener('pointerup', e => {
    if(!isDragging) return;
    isDragging = false;
    robot.style.animation = '';
    robot.style.transform = '';
    container.style.transition = '';
    if(!dragStarted){
      onRobotClick();
    }
    try{ container.releasePointerCapture(e.pointerId); }catch(ex){}
  });

  container.addEventListener('pointercancel', () => {
    isDragging = false;
    robot.style.animation = '';
    robot.style.transform = '';
    container.style.transition = '';
  });

  // --- Scroll reaction ---
  let lastScrollY = 0;
  let scrollDir = 0;
  function onScroll(){
    const sy = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    scrollDir = sy > lastScrollY ? 1 : -1;
    lastScrollY = sy;
    wakeUp();
    // Briefly tilt head in scroll direction
    if(!isSleeping && !isWaking){
      const head = document.getElementById('robotHead');
      head.style.transition = 'transform 0.3s ease';
      head.style.transform = 'rotateX(' + (scrollDir * 5) + 'deg)';
      setTimeout(() => {
        head.style.transform = '';
        setTimeout(() => head.style.transition = '', 300);
      }, 300);
    }
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  document.body.addEventListener('scroll', onScroll, {passive:true});

  // --- Hover social link — robot looks that way ---
  document.querySelectorAll('.social-link').forEach(link => {
    link.addEventListener('mouseenter', () => {
      if(isSleeping || isWaking) return;
      const rect = link.getBoundingClientRect();
      mouseX = rect.left + rect.width / 2;
      mouseY = rect.top + rect.height / 2;
      // Curious expression
      mouth.className = 'robot-mouth surprised';
    });
    link.addEventListener('mouseleave', () => {
      mouth.className = 'robot-mouth';
    });
  });

  // --- Initialize ---
  startWakeSequence();

})();
</script>
