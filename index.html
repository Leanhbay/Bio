<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tiểu sử của tôi</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;overflow-y:auto;-webkit-overflow-scrolling:touch}
img{pointer-events:none;-webkit-user-drag:none;user-drag:none}

/* === TINH VÂN === */
.nebula-1{position:fixed;top:-120px;left:-120px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,255,0.18) 0%,transparent 70%);filter:blur(90px);pointer-events:none;z-index:0;animation:nebFloat1 9s ease-in-out infinite}
.nebula-2{position:fixed;bottom:-120px;right:-120px;width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.16) 0%,transparent 70%);filter:blur(90px);pointer-events:none;z-index:0;animation:nebFloat2 11s ease-in-out infinite}
.nebula-3{position:fixed;top:40%;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,0.13) 0%,transparent 70%);filter:blur(100px);pointer-events:none;z-index:0;animation:nebFloat3 13s ease-in-out infinite}
.nebula-4{position:fixed;bottom:30%;left:-60px;width:350px;height:350px;background:radial-gradient(circle,rgba(168,85,247,0.10) 0%,transparent 70%);filter:blur(80px);pointer-events:none;z-index:0;animation:nebFloat1 15s ease-in-out infinite reverse}
@keyframes nebFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,30px) scale(1.12)}}
@keyframes nebFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-25px) scale(1.1)}}
@keyframes nebFloat3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,20px) scale(1.15)}}

/* === LƯỚI KHÔNG GIAN === */
.space-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:1}

/* === SCANLINE === */
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 6px);pointer-events:none;z-index:2}

/* === VẾT QUÉT === */
.scan-sweep{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,0.6) 50%,transparent 100%);z-index:100;animation:sweep 5s ease-in-out infinite;pointer-events:none}
@keyframes sweep{0%{transform:translateX(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(100%);opacity:0}}

/* === TRÒN BẬT/TẮT === */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* === HIỆN === */
.reveal{opacity:0;transform:translateY(30px) scale(0.98);transition:all 0.8s cubic-bezier(0.16,1,0.3,1);filter:blur(10px)}
.reveal.active{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
.delay-1{transition-delay:100ms}.delay-2{transition-delay:200ms}.delay-3{transition-delay:300ms}
.delay-4{transition-delay:400ms}.delay-5{transition-delay:500ms}.delay-6{transition-delay:600ms}
.delay-7{transition-delay:700ms}.delay-8{transition-delay:800ms}.delay-9{transition-delay:900ms}

/* === AVATAR VÀ QUỸ ĐẠO === */
.orbit-system{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;perspective:600px;margin-bottom:24px}
.orbit-ring{position:absolute;inset:0;border-radius:50%;border:1px solid}
.ring-1{border-color:rgba(0,229,255,0.18);transform:rotateX(72deg);animation:orbitSpin1 7s linear infinite}
.ring-2{border-color:rgba(124,58,237,0.14);transform:rotateX(72deg) rotateY(55deg);animation:orbitSpin2 9s linear infinite}
.orbit-particle{position:absolute;width:5px;height:5px;border-radius:50%;top:-2.5px;left:50%;margin-left:-2.5px}
.ring-1 .orbit-particle{background:#00e5ff;box-shadow:0 0 8px #00e5ff,0 0 20px rgba(0,229,255,0.4)}
.ring-2 .orbit-particle{background:#7c3aed;box-shadow:0 0 8px #7c3aed,0 0 20px rgba(124,58,237,0.4)}
@keyframes orbitSpin1{to{transform:rotateX(72deg) rotateZ(360deg)}}
@keyframes orbitSpin2{to{transform:rotateX(72deg) rotateY(55deg) rotateZ(360deg)}}
.avatar-ring{background:conic-gradient(from 0deg,#00e5ff,#7c3aed,#06b6d4,#00e5ff);animation:ringRotate 4s linear infinite;padding:3px}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.avatar-wrapper{position:relative;z-index:2;transition:transform 0.5s cubic-bezier(0.16,1,0.3,1)}

/* === TRẠNG THÁI === */
.status-dot{animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.radar-ping{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(0,229,255,0.4);animation:radarPing 2s ease-out infinite}
.radar-ping:nth-child(2){animation-delay:0.7s}
@keyframes radarPing{0%{transform:scale(1);opacity:0.8}100%{transform:scale(2.8);opacity:0}}

/* === ĐỒNG HỒ === */
.live-clock-container{display:flex;align-items:center;justify-content:center;gap:16px;padding:18px 20px;border-radius:16px;background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.08);box-shadow:inset 0 0 40px rgba(0,229,255,0.015);margin-bottom:8px}
.clock-time{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#00e5ff 0%,#e2e8f0 40%,#c4b5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.clock-seconds{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:400;color:#00e5ff;opacity:0.6;font-variant-numeric:tabular-nums;animation:secPulse 1s ease-in-out infinite}
@keyframes secPulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
.clock-separator{display:flex;flex-direction:column;gap:4px}
.clock-separator span{width:3px;height:3px;border-radius:50%;background:#00e5ff;opacity:0.3}
.clock-date{font-size:12px;color:#64748b;font-weight:500;text-align:center;margin-bottom:20px;letter-spacing:0.5px}

/* === THẺ IP === */
.ip-card{background:rgba(0,229,255,0.025);border:1px solid rgba(0,229,255,0.06);border-radius:20px;overflow:hidden;max-height:0;opacity:0;margin-bottom:0;transition:all 0.6s cubic-bezier(0.16,1,0.3,1);border-width:0}
.ip-card.visible{max-height:600px;opacity:1;margin-bottom:32px;border-width:1px}
.ip-card-header{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,229,255,0.05)}
.ip-card-body{padding:4px 20px 20px}
.ip-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;opacity:0;transform:translateY(12px);transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
.ip-row.show{opacity:1;transform:translateY(0)}
.ip-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.03)}
.ip-label{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;font-weight:500}
.ip-label .iconify{font-size:14px;color:#00e5ff;opacity:0.6}
.ip-value{font-size:13px;color:#cbd5e1;font-weight:500;font-variant-numeric:tabular-nums}
.ip-value.primary{color:#00e5ff;font-weight:600;font-size:14px;letter-spacing:0.5px;text-shadow:0 0 12px rgba(0,229,255,0.3)}
.ip-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.ip-badge.ipv4{background:rgba(0,229,255,0.1);color:#00e5ff}
.ip-badge.ipv6{background:rgba(124,58,237,0.12);color:#c4b5fd}
.ip-copy-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.1);color:#94a3b8;font-size:11px;cursor:pointer;transition:all 0.3s ease}
.ip-copy-btn:hover{background:rgba(0,229,255,0.1);color:#e2e8f0;border-color:rgba(0,229,255,0.2)}
.ip-copy-btn.copied{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.3);color:#00e5ff}

/* === NGĂN CÁCH === */
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(0,229,255,0.25),rgba(124,58,237,0.25),transparent);position:relative;margin-bottom:24px}
.divider::after{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:6px;height:5px;background:#00e5ff;border-radius:50%;box-shadow:0 0 10px #00e5ff,0 0 25px rgba(0,229,255,0.3)}

/* === LIÊN KẾT XÃ HỘI === */
.social-links-wrap{perspective:1000px}
.social-link{position:relative;display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:16px;background:rgba(0,229,255,0.025);border:1px solid rgba(0,229,255,0.06);backdrop-filter:blur(10px);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);overflow:hidden;cursor:pointer;text-decoration:none;color:#e2e8f0;transform-style:preserve-3d}
.social-link::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.4s ease;border-radius:16px}
.social-link:hover{transform:translateY(-3px) rotateX(2deg) scale(1.02);border-color:rgba(0,229,255,0.15);box-shadow:0 8px 32px -8px rgba(0,229,255,0.12),0 0 0 1px rgba(0,229,255,0.05),inset 0 1px 0 rgba(255,255,255,0.04)}
.social-link:hover::before{opacity:1}
.social-link:active{transform:translateY(0) scale(0.98)}
.social-link.facebook::before{background:linear-gradient(135deg,rgba(24,119,242,0.12),rgba(24,119,242,0.02))}
.social-link.facebook:hover{border-color:rgba(24,119,242,0.25);box-shadow:0 8px 32px -8px rgba(24,119,242,0.2)}
.social-link.facebook .social-icon{color:#1877F2}
.social-link.instagram::before{background:linear-gradient(135deg,rgba(225,48,108,0.12),rgba(131,58,180,0.06))}
.social-link.instagram:hover{border-color:rgba(225,48,108,0.25);box-shadow:0 8px 32px -8px rgba(225,48,108,0.18)}
.social-link.instagram .social-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.social-link.tiktok::before{background:linear-gradient(135deg,rgba(255,0,80,0.12),rgba(0,242,234,0.06))}
.social-link.tiktok:hover{border-color:rgba(255,0,80,0.25);box-shadow:0 8px 32px -8px rgba(255,0,80,0.15)}
.social-link.tiktok .social-icon{background:linear-gradient(135deg,#ff0050,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.social-link.zalo::before{background:linear-gradient(135deg,rgba(0,136,255,0.12),rgba(0,136,255,0.02))}
.social-link.zalo:hover{border-color:rgba(0,136,255,0.25);box-shadow:0 8px 32px -8px rgba(0,136,255,0.2)}
.social-link.zalo .social-icon{color:#0088FF}
.social-link.youtube::before{background:linear-gradient(135deg,rgba(255,0,0,0.12),rgba(255,0,0,0.02))}
.social-link.youtube:hover{border-color:rgba(255,0,0,0.25);box-shadow:0 8px 32px -8px rgba(255,0,0,0.18)}
.social-link.youtube .social-icon{color:#FF0000}
.social-link.telegram::before{background:linear-gradient(135deg,rgba(0,136,204,0.12),rgba(0,136,204,0.02))}
.social-link.telegram:hover{border-color:rgba(0,136,204,0.25);box-shadow:0 8px 32px -8px rgba(0,136,204,0.2)}
.social-link.telegram .social-icon{color:#0088CC}
.social-icon{font-size:26px;flex-shrink:0;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1)}
.social-link:hover .social-icon{transform:scale(1.15) rotateY(10deg)}
.social-arrow{margin-left:auto;opacity:0;transform:translateX(-8px);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);color:#00e5ff}
.social-link:hover .social-arrow{opacity:0.7;transform:translateX(0)}

/* === NÚT CHIA SẺ === */
.share-btn{position:fixed;bottom:24px;right:24px;z-index:50;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#00e5ff,#7c3aed);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;box-shadow:0 8px 30px -6px rgba(0,229,255,0.4),0 0 20px rgba(124,58,237,0.2);transition:all 0.3s ease}
.share-btn:hover{transform:scale(1.1) rotate(15deg);box-shadow:0 12px 40px -6px rgba(0,229,255,0.5),0 0 30px rgba(124,58,237,0.3)}
.share-btn:active{transform:scale(0.95)}

/* === THÔNG BÁO === */
.toast{position:fixed;bottom:84px;right:24px;z-index:50;padding:12px 20px;border-radius:12px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:#00e5ff;font-size:13px;font-weight:500;backdrop-filter:blur(10px);opacity:0;transform:translateY(10px);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:none;box-shadow:0 0 20px rgba(0,229,255,0.1)}
.toast.show{opacity:1;transform:translateY(0)}

/* === ONLINE DOT === */
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;position:relative;flex-shrink:0}
.online-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid rgba(34,197,94,0.4);animation:gpsRing 2s ease-out infinite}
@keyframes gpsRing{0%{transform:scale(1);opacity:1}100%{transform:scale(2.2);opacity:0}}

/* === CUỘN === */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:99px}

/* === NHẠC === */
#ytPlayerContainer{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden}

/* === LABEL TIÊU ĐỀ === */
.section-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#00e5ff;opacity:0.5}
</style>
</head>
<body>

<div id="ytPlayerContainer"><div id="ytPlayer"></div></div>

<!-- TINH VÂN -->
<div class="nebula-1"></div>
<div class="nebula-2"></div>
<div class="nebula-3"></div>
<div class="nebula-4"></div>

<!-- LƯỚI + SCANLINE -->
<div class="space-grid"></div>
<div class="scanlines"></div>
<div class="scan-sweep"></div>

<!-- SAO BĂNG -->
<canvas id="particles"></canvas>

<!-- NỘI DUNG CHÍNH -->
<main class="relative z-10 flex items-center justify-center min-h-screen px-4 py-12">
<div class="w-full max-w-md">

  <!-- AVATAR + QUỸ ĐẠO -->
  <div class="flex flex-col items-center mb-8">
    <div class="reveal orbit-system">
      <div class="orbit-ring ring-1"><div class="orbit-particle"></div></div>
      <div class="orbit-ring ring-2"><div class="orbit-particle"></div></div>
      <div class="avatar-wrapper">
        <div class="avatar-ring w-[120px] h-[120px] rounded-full">
          <div class="w-full h-full rounded-full overflow-hidden bg-[#0f172a] p-[3px]">

          </div>
        </div>
        <div class="absolute bottom-1 right-1 w-6 h-6 rounded-full bg-[#0f172a] flex items-center justify-center">
          <div class="radar-ping"></div>
          <div class="radar-ping"></div>
          <div class="status-dot w-3.5 h-3.5 rounded-full bg-green-500"></div>
        </div>
      </div>
    </div>

    <h1 class="reveal delay-1 text-2xl font-semibold tracking-tight mb-1" style="font-family:'Orbitron',sans-serif;letter-spacing:1px;background:linear-gradient(135deg,#e2e8f0,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">leanhbay</h1>
    <p class="reveal delay-2 text-sm text-slate-400 mb-3" style="letter-spacing:0.5px">@leanhbay</p>

      ✨ Chào cậu<br>

  </div>

  <!-- ĐỒNG HỒ -->
  <div class="reveal delay-4">
    <div class="live-clock-container">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span class="clock-time" id="clockHM">--:--</span>
        <span class="clock-seconds" id="clockSec">:--</span>
      </div>
      <div class="clock-separator"><span></span><span></span></div>
      <div style="text-align:right">
        <div id="clockTzLabel" style="font-family:'Orbitron',sans-serif;font-size:10px;color:#00e5ff;font-weight:600;letter-spacing:1px;opacity:0.6">LOCAL</div>
        <div id="clockTzOffset" style="font-size:10px;color:#64748b;font-weight:500">UTC+0</div>
      </div>
    </div>
    <div class="clock-date" id="clockDate">Đang tải...</div>
  </div>

  <!-- THẺ IP -->
  <div class="ip-card reveal delay-5" id="ipCard">
    <div class="ip-card-header">
      <span class="iconify" data-icon="mdi:shield-eye" data-width="18" style="color:#00e5ff"></span>
      <span class="section-label">Thông tin truy cập</span>
      <span class="ml-auto" id="statusIcon"></span>
    </div>
    <div class="ip-card-body" id="ipBody"></div>
  </div>

  <!-- NGĂN CÁCH -->
  <div class="reveal delay-6 divider"></div>

  <!-- LIÊN KẾT XÃ HỘI -->
  <div class="social-links-wrap flex flex-col gap-3 mb-8">
    <a href="https://www.facebook.com/share/1DAZ6EvoHn/?mibextid=wwXIfr" target="_blank" class="reveal delay-6 social-link facebook">

      <div><div class="text-sm font-medium">Instagram</div></div>
      <span class="social-arrow"><span class="iconify" data-icon="mdi:arrow-right" data-width="18"></span></span>
    </a>
    <a href="https://www.tiktok.com/@leanhbay?_r=1&_t=ZS-97yHkjYeByK" target="_blank" class="reveal delay-7 social-link tiktok">

    </a>
    <a href="https://zalo.me/0353319326" target="_blank" class="reveal delay-7 social-link zalo">

      <div><div class="text-sm font-medium">Zalo</div></div>
      <span class="social-arrow"><span class="iconify" data-icon="mdi:arrow-right" data-width="18"></span></span>
    </a>
    <a href="https://youtube.com/@leanhbay2006?si=gkjsfRiQGQrb18X5" target="_blank" class="reveal delay-8 social-link youtube">
      <span class="social-icon"><span class="iconify" data-icon="mdi:youtube" data-width="26"></span></span>
      <div><div class="text-sm font-medium">YouTube</div></div>
      <span class="social-arrow"><span class="iconify" data-icon="mdi:arrow-right" data-width="18"></span></span>
    </a>
    <a href="https://t.me/mr777lab" target="_blank" class="reveal delay-8 social-link telegram">
      <span class="social-icon"><span class="iconify" data-icon="mdi:telegram" data-width="26"></span></span>
      <div><div class="text-sm font-medium">Telegram</div></div>
      <span class="social-arrow"><span class="iconify" data-icon="mdi:arrow-right" data-width="18"></span></span>
    </a>
  </div>

  <!-- FOOTER -->
  <div class="reveal delay-9 divider" style="margin-bottom:20px"></div>
  <div class="reveal delay-9 text-center pb-8">
    <div class="flex items-center justify-center gap-3 mb-3">
      <div class="w-1 h-1 rounded-full bg-cyan-400" style="box-shadow:0 0 6px #00e5ff"></div>
      <span class="section-label">Liên kết tiểu sử</span>
      <div class="w-1 h-1 rounded-full bg-purple-400" style="box-shadow:0 0 6px #7c3aed"></div>
    </div>
    <p class="text-[11px] text-slate-600">© 2026 leanhbay</p>
  </div>

</div>
</main>

<!-- NÚT CHIA SẺ -->
<button class="share-btn" onclick="shareProfile()" title="Chia sẻ">
  <span class="iconify" data-icon="mdi:share-variant" data-width="20"></span>
</button>

<!-- THÔNG BÁO -->
<div class="toast" id="toast">
  <span class="iconify inline-block align-middle mr-1" data-icon="mdi:check-circle" data-width="16"></span>
  <span id="toastText">Đã sao chép!</span>
</div>

<script>
// ============================
// CHỐNG THU PHÓNG / COPY
// ============================
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if(e.key==='F12'){e.preventDefault();return false}
  if(e.ctrlKey&&e.shiftKey&&['I','i','J','j','C','c'].includes(e.key)){e.preventDefault();return false}
  if(e.ctrlKey&&['U','u'].includes(e.key)){e.preventDefault();return false}
  if(e.ctrlKey&&['S','s'].includes(e.key)){e.preventDefault();return false}
  if(e.ctrlKey&&['C','c'].includes(e.key)){e.preventDefault();return false}
  if(e.ctrlKey&&['P','p'].includes(e.key)){e.preventDefault();return false}
  if(e.ctrlKey&&e.shiftKey&&['U','u'].includes(e.key)){e.preventDefault();return false}
});
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend', e=>{const n=Date.now();if(n-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=n},{passive:false});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('wheel', e=>{if(e.ctrlKey)e.preventDefault()},{passive:false});

// ============================
// NHẠC — YouTube IFrame API
// ============================
let ytPlayer=null, playerReady=false;
const tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('ytPlayer',{
    width:'1',height:'1',videoId:'ECLfqo75Qh8',
    playerVars:{autoplay:1,loop:1,playlist:'ECLfqo75Qh8',controls:0,showinfo:0,modestbranding:1,rel:0,fs:0,iv_load_policy:3,disablekb:1},
    events:{'onReady':onPlayerReady,'onStateChange':onPlayerStateChange}
  });
}
function onPlayerReady(e){playerReady=true;e.target.setVolume(100);e.target.playVideo()}
function onPlayerStateChange(e){if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.CUED)tryPlay()}
function tryPlay(){if(ytPlayer&&playerReady)try{ytPlayer.setVolume(100);ytPlayer.playVideo()}catch(e){}}
function forcePlay(){tryPlay();['click','touchstart','touchend','scroll','keydown','pointerdown'].forEach(ev=>document.removeEventListener(ev,forcePlay))}
['click','touchstart','touchend','scroll','keydown','pointerdown'].forEach(ev=>document.addEventListener(ev,forcePlay));
let retryCount=0;
let playRetry=setInterval(()=>{
  retryCount++;
  if(ytPlayer&&playerReady&&ytPlayer.getPlayerState){
    try{if(ytPlayer.getPlayerState()!==YT.PlayerState.PLAYING){ytPlayer.setVolume(100);ytPlayer.playVideo()}else{clearInterval(playRetry)}}catch(e){}
  }
  if(retryCount>40)clearInterval(playRetry);
},500);

// ============================
// HIỆN CÁC PHẦN TỬ
// ============================
function revealElements(){document.querySelectorAll('.reveal').forEach(el=>{if(el.getBoundingClientRect().top<window.innerHeight-40)el.classList.add('active')})}
window.addEventListener('scroll',revealElements);
document.body.addEventListener('scroll',revealElements);
window.addEventListener('load',revealElements);
setTimeout(revealElements,1000);

// ============================
// SAO BĂNG 3D (Canvas)
// ============================
const cvs=document.getElementById('particles'), cx=cvs.getContext('2d');
let stars=[], shootingStars=[];
function rsz(){cvs.width=innerWidth;cvs.height=innerHeight}
rsz();
addEventListener('resize',rsz);

class Star{
  constructor(layer){this.layer=layer;this.reset(true)}
  reset(init){
    this.x=Math.random()*cvs.width;
    this.y=init?Math.random()*cvs.height:-2;
    const cfg=[{s:0.4+Math.random()*0.4,sp:0.08,a:0.15+Math.random()*0.1},{s:0.8+Math.random()*0.6,sp:0.2,a:0.3+Math.random()*0.15},{s:1.2+Math.random()*0.8,sp:0.4,a:0.5+Math.random()*0.2}];
    const c=cfg[this.layer];
    this.s=c.s; this.speed=c.sp; this.baseAlpha=c.a;
    this.twinkleSpeed=0.015+Math.random()*0.025;
    this.twinkleOffset=Math.random()*Math.PI*2;
    const colors=['255,255,255','0,229,255','180,160,255','120,200,255','255,220,180'];
    this.rgb=colors[Math.floor(Math.random()*colors.length)];
  }
  update(t){
    this.y+=this.speed;
    if(this.y>cvs.height+5)this.reset(false);
    this.alpha=this.baseAlpha*(0.4+0.6*Math.sin(t*this.twinkleSpeed+this.twinkleOffset));
  }
  draw(){
    cx.beginPath();
    cx.arc(this.x,this.y,this.s,0,Math.PI*2);
    cx.fillStyle='rgba('+this.rgb+','+Math.max(0,this.alpha)+')';
    cx.fill();
    if(this.layer===2&&this.alpha>0.45){
      cx.beginPath();
      cx.arc(this.x,this.y,this.s*3,0,Math.PI*2);
      cx.fillStyle='rgba('+this.rgb+','+(this.alpha*0.1)+')';
      cx.fill();
    }
  }
}

class ShootingStar{
  constructor(){this.active=false}
  launch(){
    this.active=true;
    this.x=Math.random()*cvs.width*0.8;
    this.y=Math.random()*cvs.height*0.4;
    this.len=50+Math.random()*80;
    this.speed=7+Math.random()*5;
    this.angle=Math.PI/5+(Math.random()-0.5)*0.4;
    this.alpha=1;
    this.decay=0.012+Math.random()*0.008;
  }
  update(){
    if(!this.active)return;
    this.x+=Math.cos(this.angle)*this.speed;
    this.y+=Math.sin(this.angle)*this.speed;
    this.alpha-=this.decay;
    if(this.alpha<=0)this.active=false;
  }
  draw(){
    if(!this.active)return;
    const tx=this.x-Math.cos(this.angle)*this.len;
    const ty=this.y-Math.sin(this.angle)*this.len;
    const g=cx.createLinearGradient(tx,ty,this.x,this.y);
    g.addColorStop(0,'rgba(0,229,255,0)');
    g.addColorStop(0.7,'rgba(0,229,255,'+this.alpha*0.5+')');
    g.addColorStop(1,'rgba(255,255,255,'+this.alpha+')');
    cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(this.x,this.y);
    cx.strokeStyle=g;cx.lineWidth=1.5;cx.stroke();
    // đầu sao
    cx.beginPath();cx.arc(this.x,this.y,1.5,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,'+this.alpha+')';cx.fill();
  }
}

for(let i=0;i<45;i++)stars.push(new Star(0));
for(let i=0;i<25;i++)stars.push(new Star(1));
for(let i=0;i<12;i++)stars.push(new Star(2));
for(let i=0;i<3;i++)shootingStars.push(new ShootingStar());

let frameCount=0;
function animateStars(){
  frameCount++;
  cx.clearRect(0,0,cvs.width,cvs.height);
  stars.forEach(s=>{s.update(frameCount);s.draw()});
  shootingStars.forEach(ss=>{ss.update();ss.draw()});
  // ngẫu nhiên phóng sao băng
  if(Math.random()<0.003){
    const idle=shootingStars.find(s=>!s.active);
    if(idle)idle.launch();
  }
  requestAnimationFrame(animateStars);
}
animateStars();

// ============================
// CHIA SẺ
// ============================
function shareProfile(){
  if(navigator.share)navigator.share({title:'Tiểu sử',text:'Xem hồ sơ của tôi!',url:location.href}).catch(()=>{});
  else navigator.clipboard.writeText(location.href).then(()=>showToast('Đã sao chép liên kết!')).catch(()=>{});
}
function showToast(t){
  const e=document.getElementById('toast');
  document.getElementById('toastText').textContent=t;
  e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),2500);
}

// ============================
// ĐỒNG HỒ TRỰC TIẾP
// ============================
const clockHM=document.getElementById('clockHM');
const clockSec=document.getElementById('clockSec');
const clockDate=document.getElementById('clockDate');
const clockTzLabel=document.getElementById('clockTzLabel');
const clockTzOffset=document.getElementById('clockTzOffset');

const deviceTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
clockTzLabel.textContent=deviceTZ.split('/').pop().replace(/_/g,' ');
const n0=new Date(), u0=n0.toLocaleString('en-US',{timeZone:'UTC'}), l0=n0.toLocaleString('en-US');
const dH=Math.round((new Date(l0)-new Date(u0))/3600000);
clockTzOffset.textContent='UTC'+(dH>=0?'+':'')+dH;

const dayN=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
function tick(){
  const n=new Date();
  clockHM.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  clockSec.textContent=':'+String(n.getSeconds()).padStart(2,'0');
  clockDate.textContent=dayN[n.getDay()]+', '+String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();
}
tick();
setInterval(tick,1000);

// ============================
// THÔNG TIN IP
// ============================
function getFlag(c){return String.fromCodePoint(...c.toUpperCase().split('').map(ch=>127397+ch.charCodeAt(0)))}
function fetchWithTimeout(url,ms){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms||8000);
  return fetch(url,{signal:ctrl.signal}).then(r=>{clearTimeout(tid);if(!r.ok)throw new Error(r.status);return r.json()}).catch(e=>{clearTimeout(tid);throw e});
}
function normalize(data,source){
  const r={ip:null,ver:null,city:null,region:null,country:null,cc:null,tz:null,lat:null,lon:null};
  if(source==='ipwho'){r.ip=data.ip;r.ver=data.type||'IPv4';r.city=data.city;r.region=data.region;r.country=data.country;r.cc=data.country_code;r.tz=data.timezone?.id;r.lat=data.latitude;r.lon=data.longitude;}
  else if(source==='ipapi'){r.ip=data.ip;r.ver=(data.ip||'').includes(':')?'IPv6':'IPv4';r.city=data.city;r.region=data.region;r.country=data.country_name;r.cc=data.country_code;r.tz=data.timezone;r.lat=data.latitude;r.lon=data.longitude;}
  else if(source==='freeip'){r.ip=data.ipAddress;r.ver=(data.ipAddress||'').includes(':')?'IPv6':'IPv4';r.city=data.cityName;r.region=data.regionName;r.country=data.countryName;r.cc=data.countryCode;r.tz=data.timeZone;r.lat=data.latitude;r.lon=data.longitude;}
  else if(source==='ipify'){r.ip=data.ip;r.ver=(data.ip||'').includes(':')?'IPv6':'IPv4';}
  return r;
}
async function fetchIPInfo(){
  let info=null;
  try{const d=await fetchWithTimeout('https://ipwho.is/json/');if(d&&d.success!==false&&d.ip)info=normalize(d,'ipwho')}catch(e){}
  if(!info||!info.city){try{const d=await fetchWithTimeout('https://ipapi.co/json/');if(d&&d.ip){const n=normalize(d,'ipapi');info=info?{...info,...n}:n}}catch(e){}}
  if(!info||!info.city){try{const d=await fetchWithTimeout('https://freeipapi.com/api/json');if(d&&d.ipAddress){const n=normalize(d,'freeip');info=info?{...info,...n}:n}}catch(e){}}
  if(!info){try{const d=await fetchWithTimeout('https://api.ipify.org?format=json');if(d&&d.ip)info=normalize(d,'ipify')}catch(e){}}
  if(info&&info.ip)showCard(info);
}
function showCard(d){
  const card=document.getElementById('ipCard'),body=document.getElementById('ipBody'),icon=document.getElementById('statusIcon');
  const ver=d.ver||'IPv4', verCls=ver==='IPv6'?'ipv6':'ipv4';
  const flag=d.cc?getFlag(d.cc):'🌍';
  const loc=[d.city,d.region,d.country].filter(Boolean).join(', ')||'Không xác định';
  const tz=d.tz||deviceTZ;
  let html=`
    <div class="ip-row" data-i="0"><div class="ip-label"><span class="iconify" data-icon="mdi:ip-network" data-width="14"></span>Địa chỉ IP</div><div class="flex items-center gap-2"><span class="ip-value primary">${d.ip}</span><span class="ip-badge ${verCls}">${ver}</span></div></div>
    <div class="ip-row" data-i="1"><div class="ip-label"><span class="iconify" data-icon="mdi:map-marker" data-width="14"></span>Vị trí</div><div class="flex items-center gap-1.5"><span class="text-sm">${flag}</span><span class="ip-value">${loc}</span></div></div>
    <div class="ip-row" data-i="2"><div class="ip-label"><span class="iconify" data-icon="mdi:clock-outline" data-width="14"></span>Múi giờ</div><span class="ip-value" style="font-size:12px;color:#94a3b8">${tz}</span></div>`;
  if(d.lat!=null&&d.lon!=null)html+=`<div class="ip-row" data-i="3"><div class="ip-label"><span class="iconify" data-icon="mdi:crosshairs-gps" data-width="14"></span>Tọa độ</div><span class="ip-value" style="font-size:12px;color:#94a3b8;font-family:'SF Mono','Fira Code',monospace">${Number(d.lat).toFixed(4)}, ${Number(d.lon).toFixed(4)}</span></div>`;
  html+=`<div style="padding-top:14px;display:flex;justify-content:center"><button class="ip-copy-btn" onclick="copyIP('${d.ip}',this)"><span class="iconify" data-icon="mdi:content-copy" data-width="12"></span> Sao chép IP</button></div>`;
  body.innerHTML=html;
  icon.innerHTML='<div class="online-dot"></div>';
  requestAnimationFrame(()=>{
    card.classList.add('visible');card.classList.add('active');
    body.querySelectorAll('.ip-row').forEach((row,i)=>setTimeout(()=>row.classList.add('show'),100+i*120));
  });
}
function copyIP(ip,btn){
  navigator.clipboard.writeText(ip).then(()=>{
    btn.classList.add('copied');
    btn.innerHTML='<span class="iconify" data-icon="mdi:check" data-width="12"></span> Đã sao chép!';
    showToast('Xác nhận sao chép IP: '+ip);
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<span class="iconify" data-icon="mdi:content-copy" data-width="12"></span> Sao chép IP'},2000);
  });
}
fetchIPInfo();
</script>
