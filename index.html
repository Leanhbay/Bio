<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;
          -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
          -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
          touch-action:manipulation}
        html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0}
        body{font-family:'Inter',sans-serif;background:#030304;color:#fff;overflow-y:auto;-webkit-overflow-scrolling:touch}
        img{pointer-events:none;-webkit-user-drag:none;user-drag:none}

        .bg-glow-1{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);filter:blur(80px);pointer-events:none;z-index:0;animation:float1 8s ease-in-out infinite}
        .bg-glow-2{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,0.12) 0%,transparent 70%);filter:blur(80px);pointer-events:none;z-index:0;animation:float2 10s ease-in-out infinite}
        .bg-glow-3{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,transparent 70%);filter:blur(100px);pointer-events:none;z-index:0;animation:float3 12s ease-in-out infinite}
        @keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.1)}}
        @keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-30px) scale(1.15)}}
        @keyframes float3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

        .noise-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.03;background-image:url('https://grainy-gradients.vercel.app/noise.svg');background-size:200px 200px}

        .reveal{opacity:0;transform:translateY(30px) scale(0.98);transition:all 0.8s cubic-bezier(0.16,1,0.3,1);filter:blur(10px)}
        .reveal.active{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
        .delay-1{transition-delay:100ms}.delay-2{transition-delay:200ms}.delay-3{transition-delay:300ms}
        .delay-4{transition-delay:400ms}.delay-5{transition-delay:500ms}.delay-6{transition-delay:600ms}
        .delay-7{transition-delay:700ms}.delay-8{transition-delay:800ms}.delay-9{transition-delay:900ms}
        .delay-10{transition-delay:1000ms}

        .avatar-ring{background:conic-gradient(from 0deg,#6366f1,#a855f7,#3b82f6,#6366f1);animation:ring-rotate 4s linear infinite}
        @keyframes ring-rotate{to{transform:rotate(360deg)}}
        .avatar-wrapper{transition:transform 0.5s cubic-bezier(0.16,1,0.3,1)}

        .status-dot{animation:pulse-dot 2s ease-in-out infinite}
        @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

        .social-link{position:relative;display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);overflow:hidden;cursor:pointer;text-decoration:none;color:#fff}
        .social-link::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.4s ease;border-radius:16px}
        .social-link:hover{transform:translateY(-2px) scale(1.02);border-color:rgba(255,255,255,0.12)}
        .social-link:hover::before{opacity:1}
        .social-link:active{transform:translateY(0) scale(0.98)}

        .social-link.facebook::before{background:linear-gradient(135deg,rgba(24,119,242,0.15),rgba(24,119,242,0.03))}
        .social-link.facebook:hover{border-color:rgba(24,119,242,0.3);box-shadow:0 8px 30px -8px rgba(24,119,242,0.2)}
        .social-link.facebook .social-icon{color:#1877F2}
        .social-link.instagram::before{background:linear-gradient(135deg,rgba(225,48,108,0.15),rgba(131,58,180,0.08))}
        .social-link.instagram:hover{border-color:rgba(225,48,108,0.3);box-shadow:0 8px 30px -8px rgba(225,48,108,0.2)}
        .social-link.instagram .social-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .social-link.tiktok::before{background:linear-gradient(135deg,rgba(255,0,80,0.15),rgba(0,242,234,0.08))}
        .social-link.tiktok:hover{border-color:rgba(255,0,80,0.3);box-shadow:0 8px 30px -8px rgba(255,0,80,0.15)}
        .social-link.tiktok .social-icon{background:linear-gradient(135deg,#ff0050,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .social-link.zalo::before{background:linear-gradient(135deg,rgba(0,136,255,0.15),rgba(0,136,255,0.03))}
        .social-link.zalo:hover{border-color:rgba(0,136,255,0.3);box-shadow:0 8px 30px -8px rgba(0,136,255,0.2)}
        .social-link.zalo .social-icon{color:#0088FF}
        .social-link.youtube::before{background:linear-gradient(135deg,rgba(255,0,0,0.15),rgba(255,0,0,0.03))}
        .social-link.youtube:hover{border-color:rgba(255,0,0,0.3);box-shadow:0 8px 30px -8px rgba(255,0,0,0.2)}
        .social-link.youtube .social-icon{color:#FF0000}
        .social-link.telegram::before{background:linear-gradient(135deg,rgba(0,136,204,0.15),rgba(0,136,204,0.03))}
        .social-link.telegram:hover{border-color:rgba(0,136,204,0.3);box-shadow:0 8px 30px -8px rgba(0,136,204,0.2)}
        .social-link.telegram .social-icon{color:#0088CC}

        .social-icon{font-size:26px;flex-shrink:0;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1)}
        .social-link:hover .social-icon{transform:scale(1.15)}
        .social-arrow{margin-left:auto;opacity:0;transform:translateX(-8px);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);color:#64748b}
        .social-link:hover .social-arrow{opacity:1;transform:translateX(0)}

        .divider{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.08),transparent)}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px}

        .ip-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;overflow:hidden;max-height:0;opacity:0;margin-bottom:0;transition:all 0.6s cubic-bezier(0.16,1,0.3,1);border-width:0}
        .ip-card.visible{max-height:600px;opacity:1;margin-bottom:32px;border-width:1px}
        .ip-card-header{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
        .ip-card-body{padding:4px 20px 20px}
        .ip-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;opacity:0;transform:translateY(12px);transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
        .ip-row.show{opacity:1;transform:translateY(0)}
        .ip-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.03)}
        .ip-label{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;font-weight:500}
        .ip-label .iconify{font-size:14px;color:#475569}
        .ip-value{font-size:13px;color:#e2e8f0;font-weight:500;font-variant-numeric:tabular-nums}
        .ip-value.primary{color:#a5b4fc;font-weight:600;font-size:14px;letter-spacing:0.5px}
        .ip-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

        .ip-copy-btn.copied{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#34D399}

        .live-clock-container{display:flex;align-items:center;justify-content:center;gap:16px;padding:18px 20px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);margin-bottom:8px}
        .clock-time{font-size:32px;font-weight:600;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#fff 0%,#a5b4fc 50%,#c4b5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .clock-seconds{font-size:18px;font-weight:400;color:#6366f1;opacity:0.7;font-variant-numeric:tabular-nums;animation:sec-pulse 1s ease-in-out infinite}
        @keyframes sec-pulse{0%,100%{opacity:0.4}50%{opacity:1}}
        .clock-separator{display:flex;flex-direction:column;gap:4px}
        .clock-separator span{width:3px;height:3px;border-radius:50%;background:#6366f1;opacity:0.4}
        .clock-date{font-size:12px;color:#64748b;font-weight:500;text-align:center;margin-bottom:20px}

        .online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;position:relative;flex-shrink:0}
        .online-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid rgba(34,197,94,0.4);animation:gps-ring 2s ease-out infinite}
        @keyframes gps-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}

        #ytPlayerContainer{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden}
    </style>
</head>

    <script>
        // ============================================================
        //  CHỐNG THU PHÓNG — XÊ DỊCH — COPY
        // ============================================================

        // Chống chuột phải
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Chống phím tắt
        document.addEventListener('keydown', e => {
            // F12
            if(e.key === 'F12'){e.preventDefault();return false}
            // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
            if(e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)){e.preventDefault();return false}
            // Ctrl+U (View Source)
            if(e.ctrlKey && ['U','u'].includes(e.key)){e.preventDefault();return false}
            // Ctrl+S (Save)
            if(e.ctrlKey && ['S','s'].includes(e.key)){e.preventDefault();return false}
            // Ctrl+C (Copy)
            if(e.ctrlKey && ['C','c'].includes(e.key)){e.preventDefault();return false}
            // Ctrl+P (Print)
            if(e.ctrlKey && ['P','p'].includes(e.key)){e.preventDefault();return false}
            // Ctrl+Shift+U
            if(e.ctrlKey && e.shiftKey && ['U','u'].includes(e.key)){e.preventDefault();return false}
        });

        // Chống kéo thả hình ảnh
        document.addEventListener('dragstart', e => e.preventDefault());

        // Chống pinch zoom trên mobile
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());

        // Chống double-tap zoom trên mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if(now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, {passive: false});

        // Chống Ctrl+Copy trên mobile (nếu có bàn phím)
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        // Chống thu phóng bằng Ctrl+/+-
        document.addEventListener('wheel', e => {
            if(e.ctrlKey) e.preventDefault();
        }, {passive: false});

        // ============================================================
        //  NHẠC — YouTube IFrame API, phát ngay lập tức
        // ============================================================
        let ytPlayer = null;
        let playerReady = false;

        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayer', {
                width: '1',
                height: '1',
                videoId: 'ECLfqo75Qh8',
                playerVars: {
                    autoplay: 1,
                    loop: 1,
                    playlist: 'ECLfqo75Qh8',
                    controls: 0,
                    showinfo: 0,
                    modestbranding: 1,
                    rel: 0,
                    fs: 0,
                    iv_load_policy: 3,
                    disablekb: 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            playerReady = true;
            event.target.setVolume(100);
            event.target.playVideo();
        }

        function onPlayerStateChange(event) {
            // Bị pause/cued → ép phát lại
            if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.CUED) {
                tryPlay();
            }
        }

        function tryPlay() {
            if (ytPlayer && playerReady) {
                try {
                    ytPlayer.setVolume(100);
                    ytPlayer.playVideo();
                } catch(e) {}
            }
        }

        // Ép phát khi có BẤT KỲ tương tác nào
        function forcePlay() {
            tryPlay();
            document.removeEventListener('click', forcePlay);
            document.removeEventListener('touchstart', forcePlay);
            document.removeEventListener('touchend', forcePlay);
            document.removeEventListener('scroll', forcePlay);
            document.removeEventListener('keydown', forcePlay);
            document.removeEventListener('pointerdown', forcePlay);
        }
        document.addEventListener('click', forcePlay);
        document.addEventListener('touchstart', forcePlay);
        document.addEventListener('touchend', forcePlay);
        document.addEventListener('scroll', forcePlay);
        document.addEventListener('keydown', forcePlay);
        document.addEventListener('pointerdown', forcePlay);

        // Retry liên tục mỗi 500ms — ép phát đến khi thành công
        let retryCount = 0;
        let playRetry = setInterval(() => {
            retryCount++;
            if (ytPlayer && playerReady && ytPlayer.getPlayerState) {
                try {
                    const state = ytPlayer.getPlayerState();
                    if (state !== YT.PlayerState.PLAYING) {
                        ytPlayer.setVolume(100);
                        ytPlayer.playVideo();
                    } else {
                        clearInterval(playRetry);
                    }
                } catch(e) {}
            }
            // Dừng sau 20 giây (40 lần retry)
            if (retryCount > 40) clearInterval(playRetry);
        }, 500);

        // ===== Reveal =====
        function revealElements(){
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 40) {
                    el.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', revealElements);
        document.body.addEventListener('scroll', revealElements); 
        window.addEventListener('load', revealElements);
        setTimeout(revealElements, 1000);

        // ===== Particles =====
        const cvs=document.getElementById('particles'),cx=cvs.getContext('2d');let pts=[];
        function rsz(){cvs.width=innerWidth;cvs.height=innerHeight}rsz();addEventListener('resize',rsz);
        class P{constructor(){this.r()}r(){this.x=Math.random()*cvs.width;this.y=Math.random()*cvs.height;this.s=Math.random()*1.5+.5;this.dx=(Math.random()-.5)*.3;this.dy=(Math.random()-.5)*.3;this.o=Math.random()*.3+.1}u(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>cvs.width||this.y<0||this.y>cvs.height)this.r()}d(){cx.beginPath();cx.arc(this.x,this.y,this.s,0,Math.PI*2);cx.fillStyle=`rgba(148,163,184,${this.o})`;cx.fill()}}
        for(let i=0;i<50;i++)pts.push(new P);
        (function a(){cx.clearRect(0,0,cvs.width,cvs.height);pts.forEach(p=>{p.u();p.d()});requestAnimationFrame(a)})();

        // ===== Share =====
        function shareProfile(){if(navigator.share)navigator.share({title:'Bio',text:'Xem profile!',url:location.href}).catch(()=>{});else navigator.clipboard.writeText(location.href).then(()=>showToast('Đã sao chép liên kết!')).catch(()=>{})}
        function showToast(t){const e=document.getElementById('toast');document.getElementById('toastText').textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}

        // ===== Live Clock =====
        const clockHM=document.getElementById('clockHM'),clockSec=document.getElementById('clockSec');
        const clockDate=document.getElementById('clockDate'),clockTzLabel=document.getElementById('clockTzLabel');
        const clockTzOffset=document.getElementById('clockTzOffset');
        const deviceTZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
        clockTzLabel.textContent=deviceTZ.split('/').pop().replace(/_/g,' ');
        const n0=new Date(),u0=n0.toLocaleString('en-US',{timeZone:'UTC'}),l0=n0.toLocaleString('en-US');
        const dH=Math.round((new Date(l0)-new Date(u0))/3600000);
        clockTzOffset.textContent=`UTC${dH>=0?'+':''}${dH}`;
        const dayN=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
        function tick(){const n=new Date();clockHM.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');clockSec.textContent=':'+String(n.getSeconds()).padStart(2,'0');clockDate.textContent=`${dayN[n.getDay()]}, ${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`}
        tick();setInterval(tick,1000);

        // ===== IP Info =====
        function getFlag(c){return String.fromCodePoint(...c.toUpperCase().split('').map(ch=>127397+ch.charCodeAt(0)))}
        function fetchWithTimeout(url,ms=8000){const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),ms);return fetch(url,{signal:ctrl.signal}).then(r=>{clearTimeout(tid);if(!r.ok)throw new Error(r.status);return r.json()}).catch(e=>{clearTimeout(tid);throw e})}

        function normalize(data,source){
            const r={ip:null,ver:null,city:null,region:null,country:null,cc:null,tz:null,lat:null,lon:null};
            if(source==='ipwho'){r.ip=data.ip;r.ver=data.type||'IPv4';r.city=data.city;r.region=data.region;r.country=data.country;r.cc=data.country_code;r.tz=data.timezone?.id;r.lat=data.latitude;r.lon=data.longitude;}
            else if(source==='ipapi'){r.ip=data.ip;r.ver=(data.ip||'').includes(':')?'IPv6':'IPv4';r.city=data.city;r.region=data.region;r.country=data.country_name;r.cc=data.country_code;r.tz=data.timezone;r.lat=data.latitude;r.lon=data.longitude;}
            else if(source==='freeip'){r.ip=data.ipAddress;r.ver=(data.ipAddress||'').includes(':')?'IPv6':'IPv4';r.city=data.cityName;r.region=data.regionName;r.country=data.countryName;r.cc=data.countryCode;r.tz=data.timeZone;r.lat=data.latitude;r.lon=data.longitude;}
            else if(source==='ipify'){r.ip=data.ip;r.ver=(data.ip||'').includes(':')?'IPv6':'IPv4';}
            return r;
        }

        async function fetchIPInfo(){
            let info=null;
            try{const d=await fetchWithTimeout('https://ipwho.is/json/',8000);if(d&&d.success!==false&&d.ip)info=normalize(d,'ipwho');}catch(e){}
            if(!info||!info.city){try{const d=await fetchWithTimeout('https://ipapi.co/json/',8000);if(d&&d.ip){const n=normalize(d,'ipapi');info=info?{...info,...n}:n;}}catch(e){}}
            if(!info||!info.city){try{const d=await fetchWithTimeout('https://freeipapi.com/api/json',8000);if(d&&d.ipAddress){const n=normalize(d,'freeip');info=info?{...info,...n}:n;}}catch(e){}}
            if(!info){try{const d=await fetchWithTimeout('https://api.ipify.org?format=json',8000);if(d&&d.ip)info=normalize(d,'ipify');}catch(e){}}
            if(info&&info.ip)showCard(info);
        }

        function showCard(d){
            const card=document.getElementById('ipCard'),body=document.getElementById('ipBody'),icon=document.getElementById('statusIcon');
            const ver=d.ver||'IPv4',verCls=ver==='IPv6'?'ipv6':'ipv4';
            const flag=d.cc?getFlag(d.cc):'🌍';
            const loc=[d.city,d.region,d.country].filter(Boolean).join(', ')||'Không xác định';
            const tz=d.tz||deviceTZ;
            let html=`
                <div class="ip-row" data-i="0"><div class="ip-label"><span class="iconify" data-icon="mdi:ip-network" data-width="14"></span>Địa chỉ IP</div><div class="flex items-center gap-2"><span class="ip-value primary">${d.ip}</span><span class="ip-badge ${verCls}">${ver}</span></div></div>
                <div class="ip-row" data-i="1"><div class="ip-label"><span class="iconify" data-icon="mdi:map-marker" data-width="14"></span>Vị trí</div><div class="flex items-center gap-1.5"><span class="text-sm">${flag}</span><span class="ip-value">${loc}</span></div></div>
                <div class="ip-row" data-i="2"><div class="ip-label"><span class="iconify" data-icon="mdi:clock-outline" data-width="14"></span>Múi giờ</div><span class="ip-value" style="font-size:12px;color:#94a3b8">${tz}</span></div>`;
            if(d.lat!=null&&d.lon!=null)html+=`<div class="ip-row" data-i="3"><div class="ip-label"><span class="iconify" data-icon="mdi:crosshairs-gps" data-width="14"></span>Tọa độ</div><span class="ip-value" style="font-size:12px;color:#94a3b8;font-family:'SF Mono','Fira Code',monospace">${Number(d.lat).toFixed(4)}, ${Number(d.lon).toFixed(4)}</span></div>`;
            html+=`<div style="padding-top:14px;display:flex;justify-content:center"><button class="ip-copy-btn" onclick="copyIP('${d.ip}',this)"><span class="iconify" data-icon="mdi:content-copy" data-width="12"></span>Sao chép IP</button></div>`;
            body.innerHTML=html;icon.innerHTML='<div class="online-dot"></div>';
            requestAnimationFrame(()=>{card.classList.add('visible');card.classList.add('active');body.querySelectorAll('.ip-row').forEach((row,i)=>setTimeout(()=>row.classList.add('show'),100+i*120));});
        }

        function copyIP(ip,btn){
            navigator.clipboard.writeText(ip).then(()=>{
                btn.classList.add('copied');btn.innerHTML='<span class="iconify" data-icon="mdi:check" data-width="12"></span> Đã sao chép!';
                showToast('Đã sao chép IP: '+ip);
                setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<span class="iconify" data-icon="mdi:content-copy" data-width="12"></span> Sao chép IP'},2000);
            });
        }
        fetchIPInfo();
    </script>
</body>
</html>
