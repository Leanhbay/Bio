name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_unsigned:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cài đặt XcodeGen và tạo Project
        run: |
          # Fix cảnh báo Homebrew Tap Trust
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install xcodegen
          xcodegen generate

      - name: Build thư mục .app (Bỏ qua Code Signing)
        run: |
          # Fix lỗi Exit code 65 bằng cách dùng -destination thay cho -sdk
          xcodebuild clean build \
            -project "PoolGame.xcodeproj" \
            -scheme "PoolGame" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            ENTITLEMENTS_REQUIRED="NO" \
            CONFIGURATION_BUILD_DIR=$PWD/build_output
            
      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          # Di chuyển file .app vào thư mục Payload
          mv build_output/*.app Payload/
          # Nén lại thành file .ipa
          zip -r PoolGame-Unsigned.ipa Payload

      - name: Đưa file IPA lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PoolGame-Unsigned-IPA
          path: PoolGame-Unsigned.ipa
